<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI 数据看板 · Republic Zhu</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        :root{--bg:#0a0b10;--surface:#131520;--card:#1a1d2e;--border:#2a2d42;--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#00cec9;--text:#e8eaf0;--text-dim:#8a8d9e;--text-muted:#5a5d6e;--success:#00b894;--warning:#fdcb6e;--danger:#ff6b6b;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.3)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}

        /* Top Bar */
        .topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
        .topbar .brand{font-size:15px;font-weight:700;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
        .topbar .divider{width:1px;height:20px;background:var(--border)}
        .topbar .dataset-name{color:var(--text-dim);font-size:12px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .topbar .spacer{flex:1}
        .topbar .btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
        .topbar .btn:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
        .topbar .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .topbar .btn.danger{border-color:var(--danger);color:var(--danger)}
        .topbar .btn.danger:hover{background:rgba(255,107,107,.1)}

        /* Tabs */
        .tabs{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;position:sticky;top:50px;z-index:99}
        .tab-btn{padding:8px 20px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
        .tab-btn:hover{color:var(--text-dim)}
        .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}

        .main{display:flex;min-height:calc(100vh - 90px)}

        /* Sidebar */
        .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0;position:sticky;top:90px;height:calc(100vh - 90px)}
        .sidebar.collapsed{width:0;border:none}
        .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
        .sidebar-scroll{flex:1;overflow-y:auto;padding:10px}
        .sidebar-scroll::-webkit-scrollbar{width:4px}
        .sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:8px}
        .upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(108,92,231,.05)}
        .upload-area .icon{font-size:24px;margin-bottom:4px}
        .upload-area p{color:var(--text-dim);font-size:11px}
        .upload-area .formats{color:var(--text-muted);font-size:9px;margin-top:2px}

        .field-group{margin-bottom:8px}
        .field-group-title{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;padding-left:6px}
        .field-item{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:5px;cursor:pointer;transition:background .15s;font-size:11px}
        .field-item:hover{background:rgba(108,92,231,.1)}
        .field-item .fi{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
        .field-item .fi.dim{background:rgba(0,206,201,.15);color:var(--accent3)}
        .field-item .fi.mea{background:rgba(253,203,110,.15);color:var(--warning)}
        .field-item .fi.dat{background:rgba(162,155,254,.15);color:var(--accent2)}
        .field-item .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .builder-panel{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0;position:sticky;top:90px;height:calc(100vh - 90px)}
        .builder-panel.collapsed{width:0;border:none}
        .builder-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
        .builder-scroll{flex:1;overflow-y:auto;padding:12px}
        .builder-scroll::-webkit-scrollbar{width:4px}
        .builder-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .b-section{margin-bottom:12px}
        .b-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}

        .chart-types{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
        .ct-btn{background:var(--card);border:2px solid var(--border);border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s}
        .ct-btn:hover{border-color:var(--accent)}
        .ct-btn.active{border-color:var(--accent);background:rgba(108,92,231,.15)}
        .ct-btn .ci{font-size:16px;display:block;margin-bottom:1px}
        .ct-btn .cl{font-size:8px;color:var(--text-dim)}

        .f-slot{background:var(--card);border:1px dashed var(--border);border-radius:7px;min-height:30px;padding:5px 8px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:border-color .15s;position:relative}
        .f-slot:hover{border-color:var(--accent)}
        .f-slot.has{border-style:solid;border-color:var(--accent)}
        .f-slot .sp{color:var(--text-muted);font-size:10px;flex:1}
        .f-slot .sv{flex:1;font-size:11px;color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .f-slot .sc{color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
        .f-slot .sc:hover{color:var(--danger)}

        .agg-sel{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:10px;padding:3px 6px;outline:none;margin-top:5px;width:100%}

        .filter-row{display:flex;gap:3px;align-items:center;margin-bottom:3px}
        .filter-row select,.filter-row input{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:3px 5px;outline:none;flex:1}
        .filter-row select{flex:1.5}
        .filter-row input{flex:1.2}
        .filter-row .fr-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px}
        .filter-row .fr-del:hover{color:var(--danger)}

        .data-prev-toggle{padding:7px 10px;border-top:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text-dim);transition:background .15s}
        .data-prev-toggle:hover{background:rgba(108,92,231,.05)}
        .data-preview{border-top:1px solid var(--border);overflow:auto;max-height:0;transition:max-height .3s}
        .data-preview.open{max-height:250px}
        .data-preview table{width:100%;border-collapse:collapse;font-size:9px}
        .data-preview th{position:sticky;top:0;background:var(--surface);padding:3px 5px;text-align:left;border-bottom:1px solid var(--border);color:var(--text-dim);font-weight:500;white-space:nowrap}
        .data-preview td{padding:2px 5px;border-bottom:1px solid rgba(42,45,66,.5);white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}

        /* Canvas */
        .canvas{flex:1;overflow:auto;padding:16px;position:relative;background:var(--bg)}
        .canvas::-webkit-scrollbar{width:6px;height:6px}
        .canvas::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .canvas-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center}
        .canvas-empty .ce-icon{font-size:48px;margin-bottom:10px;opacity:.3}
        .canvas-empty h2{font-size:16px;color:var(--text-dim);margin-bottom:5px}
        .canvas-empty p{font-size:12px}

        .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}

        .widget{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:wIn .25s ease}
        @keyframes wIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        .widget:hover{box-shadow:var(--shadow)}
        .widget .wh{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .widget .wt{font-size:12px;font-weight:600}
        .widget .wa{display:flex;gap:3px}
        .widget .wa button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px}
        .widget .wa button:hover{color:var(--text);background:rgba(255,255,255,.05)}
        .widget .wa button.del:hover{color:var(--danger)}
        .widget .wb{padding:10px;height:260px;position:relative}
        .widget .wb canvas{width:100%!important;height:100%!important}
        .widget .wb table{width:100%;border-collapse:collapse;font-size:11px;overflow:auto;display:block;height:100%}
        .widget .wb th{position:sticky;top:0;background:var(--card);padding:5px 8px;text-align:left;border-bottom:2px solid var(--border);color:var(--text-dim);font-size:10px}
        .widget .wb td{padding:4px 8px;border-bottom:1px solid var(--border)}
        .widget .wb tr:hover td{background:rgba(108,92,231,.05)}

        .modal-overlay{position:fixed;inset:0;background:rgba(10,11,16,.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:380px;width:90%;max-height:65vh;overflow-y:auto}
        .modal h3{font-size:13px;margin-bottom:10px}
        .modal .fpl{max-height:220px;overflow-y:auto}
        .modal .fpi{padding:6px 8px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-size:12px}
        .modal .fpi:hover{background:rgba(108,92,231,.1)}

        .toast{position:fixed;bottom:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:11px;color:var(--text);z-index:2000;box-shadow:var(--shadow);animation:tIn .3s ease,tOut .3s ease 2.3s forwards}
        @keyframes tIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tOut{from{opacity:1}to{opacity:0}}

        /* ===== Default Dashboard (ROI/UA style) ===== */
        .default-dash{width:100%;max-width:1400px;margin:0 auto}

        /* Section titles */
        .sec-title{font-size:15px;font-weight:600;margin:20px 0 12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .sec-title .st-icon{font-size:18px}

        /* KPI row */
        .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:8px}
        .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
        .kpi-card .kpi-icon{font-size:18px;margin-bottom:4px}
        .kpi-card .kpi-value{font-size:24px;font-weight:700}
        .kpi-card .kpi-label{font-size:11px;color:var(--text-dim);margin-top:2px}
        .kpi-card .kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
        .kpi-card.blue .kpi-value{color:var(--accent2)}
        .kpi-card.green .kpi-value{color:var(--success)}
        .kpi-card.orange .kpi-value{color:var(--warning)}
        .kpi-card.red .kpi-value{color:var(--danger)}
        .kpi-card.purple .kpi-value{color:var(--accent)}
        .kpi-card.cyan .kpi-value{color:var(--accent3)}

        /* Chart grid */
        .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:14px;margin-bottom:8px}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
        .chart-card h4{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
        .chart-card canvas{max-height:260px}
        .chart-card.full{grid-column:1/-1}

        /* Table */
        .data-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;max-height:400px;margin-bottom:20px}
        .data-table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
        .data-table th{position:sticky;top:0;background:var(--surface);padding:6px 10px;text-align:left;border-bottom:2px solid var(--border);color:var(--text-dim);font-size:10px;font-weight:600;z-index:1}
        .data-table th.num{text-align:right}
        .data-table td{padding:4px 10px;border-bottom:1px solid rgba(42,45,66,.4)}
        .data-table td.num{text-align:right;font-variant-numeric:tabular-nums}
        .data-table tr:hover td{background:rgba(108,92,231,.04)}
        .data-table .country-cell{display:flex;align-items:center;gap:6px}
        .data-table .flag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

        /* Progress bar in table */
        .bar-cell{display:flex;align-items:center;gap:6px}
        .bar-bg{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
        .bar-fill{height:100%;border-radius:2px}
        .bar-fill.green{background:var(--success)}
        .bar-fill.orange{background:var(--warning)}
        .bar-fill.red{background:var(--danger)}
        .bar-fill.blue{background:var(--accent2)}

        /* Metric badge */
        .badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:500}
        .badge.good{background:rgba(0,184,148,.15);color:var(--success)}
        .badge.warn{background:rgba(253,203,110,.15);color:var(--warning)}
        .badge.bad{background:rgba(255,107,107,.15);color:var(--danger)}

        @media(max-width:900px){.sidebar{width:200px}.builder-panel{width:240px}.dash-grid,.chart-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <span class="brand">🧱 BI 看板</span>
    <div class="divider"></div>
    <span class="dataset-name" id="dsName">未加载数据</span>
    <div class="spacer"></div>
    <button class="btn" onclick="toggleSidebar()">📋 字段</button>
    <button class="btn" onclick="toggleBuilder()">🎨 构建器</button>
    <div class="divider"></div>
    <button class="btn primary" onclick="document.getElementById('fileIn').click()">📤 上传数据</button>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar">
    <div class="tab-btn active" data-tab="default" onclick="switchTab('default')">📊 默认看板</div>
    <div class="tab-btn" data-tab="custom" onclick="switchTab('custom')">🎨 自定义看板</div>
</div>

<div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">📁 数据源</div>
        <div class="sidebar-scroll">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileIn').click()">
                <div class="icon">📤</div>
                <p>点击或拖拽上传</p>
                <div class="formats">.xlsx / .xls / .csv</div>
            </div>
            <div id="sheetTabs" style="display:none;margin-bottom:8px">
                <div class="b-label">工作表</div>
                <div id="sheetTabList" style="display:flex;gap:4px;flex-wrap:wrap"></div>
            </div>
            <div id="fieldsSection" style="display:none">
                <div class="field-group"><div class="field-group-title">维度</div><div id="dimFields"></div></div>
                <div class="field-group"><div class="field-group-title">度量</div><div id="meaFields"></div></div>
                <div class="field-group"><div class="field-group-title">日期</div><div id="dateFields"></div></div>
            </div>
            <div id="previewSection" style="display:none">
                <div class="data-prev-toggle" onclick="togglePreview()"><span>预览 (<span id="rowCount">0</span> 行)</span><span>▼</span></div>
                <div class="data-preview" id="dataPreview"></div>
            </div>
        </div>
    </div>

    <!-- Builder Panel -->
    <div class="builder-panel" id="builder">
        <div class="builder-header">🎨 图表构建器</div>
        <div class="builder-scroll">
            <div class="b-section">
                <div class="b-label">图表类型</div>
                <div class="chart-types">
                    <div class="ct-btn active" data-t="bar" onclick="selType('bar')"><span class="ci">📊</span><span class="cl">柱状图</span></div>
                    <div class="ct-btn" data-t="line" onclick="selType('line')"><span class="ci">📈</span><span class="cl">折线图</span></div>
                    <div class="ct-btn" data-t="pie" onclick="selType('pie')"><span class="ci">🥧</span><span class="cl">饼图</span></div>
                    <div class="ct-btn" data-t="doughnut" onclick="selType('doughnut')"><span class="ci">🍩</span><span class="cl">环形图</span></div>
                    <div class="ct-btn" data-t="scatter" onclick="selType('scatter')"><span class="ci">⚬</span><span class="cl">散点图</span></div>
                    <div class="ct-btn" data-t="radar" onclick="selType('radar')"><span class="ci">🕸️</span><span class="cl">雷达图</span></div>
                    <div class="ct-btn" data-t="polarArea" onclick="selType('polarArea')"><span class="ci">🎯</span><span class="cl">极地区域</span></div>
                    <div class="ct-btn" data-t="table" onclick="selType('table')"><span class="ci">📋</span><span class="cl">数据表</span></div>
                </div>
            </div>
            <div class="b-section">
                <div class="b-label">X 轴 (维度)</div>
                <div class="f-slot" id="xSlot" onclick="pickField('xAxis')"><span class="sp">选择维度字段</span></div>
            </div>
            <div class="b-section">
                <div class="b-label">Y 轴 (度量)</div>
                <div class="f-slot" id="ySlot" onclick="pickField('yAxis')"><span class="sp">选择度量字段</span></div>
                <select class="agg-sel" id="aggSel">
                    <option value="sum">SUM 求和</option>
                    <option value="avg">AVG 平均</option>
                    <option value="count">COUNT 计数</option>
                    <option value="min">MIN 最小值</option>
                    <option value="max">MAX 最大值</option>
                </select>
            </div>
            <div class="b-section">
                <div class="b-label">分组 (可选)</div>
                <div class="f-slot" id="gSlot" onclick="pickField('groupBy')"><span class="sp">选择分组字段</span></div>
            </div>
            <div class="b-section">
                <div class="b-label">筛选 (可选)</div>
                <div id="filterArea"></div>
                <button class="btn" onclick="addFilter()" style="width:100%;justify-content:center;margin-top:3px;font-size:10px;padding:5px">+ 添加筛选</button>
            </div>
            <div class="b-section">
                <div class="b-label">图表标题</div>
                <input type="text" id="chartTitle" placeholder="自动生成" style="width:100%;padding:6px 8px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;outline:none">
            </div>
            <button class="btn primary" onclick="addChart()" style="width:100%;justify-content:center;padding:9px;font-size:12px;margin-top:6px">➕ 添加到看板</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas" id="canvas">
        <div id="defaultView"></div>
        <div id="customView" style="display:none">
            <div class="canvas-empty" id="emptyState">
                <div class="ce-icon">📊</div>
                <h2>自定义图表构建</h2>
                <p>在左侧选择字段和图表类型 → 添加到看板</p>
            </div>
            <div class="dash-grid" id="dashGrid" style="display:none"></div>
        </div>
    </div>
</div>

<!-- Field Picker Modal -->
<div class="modal-overlay" id="fModal">
    <div class="modal">
        <h3 id="fModalTitle">选择字段</h3>
        <div class="fpl" id="fPickList"></div>
        <div style="text-align:right;margin-top:10px">
            <button class="btn" onclick="closeModal()" style="font-size:11px;padding:5px 10px">取消</button>
        </div>
    </div>
</div>

<script>
// ===== State =====
let rawData=[],headers=[],fieldTypes={},currentSheet=null,workbook=null;
let chartType='bar',cfg={xAxis:null,yAxis:null,groupBy:null,agg:'sum',filters:[]};
let widgets=[],wId=0,pickTarget=null,currentTab='default';

function loadFile(file){
    const r=new FileReader();
    r.onload=function(e){
        try{
            workbook=XLSX.read(e.target.result,{type:'array',cellDates:true});
            const sn=workbook.SheetNames;
            if(sn.length>1){
                document.getElementById('sheetTabs').style.display='block';
                const tl=document.getElementById('sheetTabList');tl.innerHTML='';
                sn.forEach(n=>{
                    const b=document.createElement('button');b.className='btn';b.style.cssText='font-size:10px;padding:3px 7px';b.textContent=n;
                    b.onclick=()=>loadSheet(n);tl.appendChild(b);
                });
                loadSheet(sn[0]);
            }else{loadSheet(sn[0])}
            ua.innerHTML=`<div class="icon">✅</div><p>${file.name}</p><div class="formats">${rawData.length} 行 × ${headers.length} 列</div>`;
            toast('✅ 已加载 '+rawData.length+' 行数据');
            if(currentTab==='default')renderDefaultDash();
        }catch(err){toast('❌ 解析失败: '+err.message)}
    };
    r.readAsArrayBuffer(file);
}

function loadSheet(name){
    currentSheet=name;
    const ws=workbook.Sheets[name];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(!aoa||!aoa.length){toast('⚠️ 空表');return}
    const parsed=smartParse(aoa);
    rawData=parsed.data;
    headers=parsed.headers;
    if(!rawData.length){toast('⚠️ 没有有效数据');return}
    fieldTypes={};
    headers.forEach(h=>{fieldTypes[h]=detectType(h,rawData)});
    const hInfo=parsed.numHeaderRows>1?` (${parsed.numHeaderRows}行标题)`:'';
    document.getElementById('dsName').textContent=currentSheet+' · '+rawData.length+' 行 · '+headers.length+' 列'+hInfo;
    renderFields();renderPreview();
    document.getElementById('fieldsSection').style.display='block';
    document.getElementById('previewSection').style.display='block';
}

function smartParse(aoa){
    const fmtDate=v=>{if(v instanceof Date){const y=v.getFullYear(),m=String(v.getMonth()+1).padStart(2,'0'),d=String(v.getDate()).padStart(2,'0');return y+'-'+m+'-'+d}return v};
    const rowInfo=[];
    for(let i=0;i<Math.min(aoa.length,15);i++){
        const row=aoa[i];let nn=0,sc=0,nc=0;
        if(row){for(const v of row){if(v!==null&&v!==undefined&&v!==''){nn++;if(typeof v==='number'||v instanceof Date)nc++;else sc++}}}
        rowInfo.push({idx:i,nn,sc,nc});
    }
    let headerEnd=0,bestNe=0;
    for(let i=0;i<rowInfo.length;i++){
        if(rowInfo[i].nn>bestNe){bestNe=rowInfo[i].nn;headerEnd=rowInfo[i].idx}
        if(rowInfo[i].nc>rowInfo[i].sc&&rowInfo[i].nn>=3)break;
    }
    const headerRows=[];
    for(let i=0;i<=headerEnd;i++){const row=aoa[i];if(row&&row.some(v=>v!==null&&v!==undefined&&v!==''))headerRows.push(row)}
    let maxCols=0;
    for(const row of aoa){if(row&&row.length>maxCols)maxCols=row.length}
    if(maxCols===0)return{headers:[],data:[],numHeaderRows:0};
    const mergedHeaders=[];
    for(let c=0;c<maxCols;c++){
        let parts=[];
        for(const row of headerRows){const v=row[c];if(v!==null&&v!==undefined&&v!=='')parts.push(String(fmtDate(v)).trim())}
        mergedHeaders.push(parts.length?parts.join(' · '):('列'+(c+1)));
    }
    const seen={};
    const uniqueHeaders=mergedHeaders.map((h,i)=>{if(seen[h]){seen[h]++;return h+' ('+seen[h]+')'}seen[h]=1;return h});
    const dataRows=[];
    for(let i=headerEnd+1;i<aoa.length;i++){
        const row=aoa[i];if(!row)continue;
        let hasData=false;for(const v of row){if(v!==null&&v!==undefined&&v!==''){hasData=true;break}}
        if(!hasData)continue;
        const obj={};for(let c=0;c<uniqueHeaders.length;c++){const v=row[c];obj[uniqueHeaders[c]]=v!==null&&v!==undefined&&v!==''?fmtDate(v):''}
        dataRows.push(obj);
    }
    return{headers:uniqueHeaders,data:dataRows,numHeaderRows:headerRows.length};
}

function detectType(col,data){
    let nc=0,dc=0,t=0;
    data.slice(0,50).forEach(r=>{
        const v=r[col];if(v===''||v==null||v===undefined)return;t++;
        if(v instanceof Date){dc++;return}
        if(typeof v==='number'){nc++;return}
        if(typeof v==='string'){const n=parseFloat(v.replace(/[,%$￥€£\s]/g,''));if(!isNaN(n)&&n.toString().length<=v.length+2)nc++;else if(/^\d{4}[-/.]\d{1,2}[-/.]/.test(v))dc++}
    });
    if(t===0)return'dim';if(dc/t>.5)return'date';if(nc/t>.5)return'mea';return'dim';
}

let filterCount=0;
function addFilter(){
    const id=filterCount++,area=document.getElementById('filterArea'),row=document.createElement('div');
    row.className='filter-row';row.id='filter-'+id;
    let opts='<option value="">字段</option>';
    headers.forEach((h,i)=>{opts+=`<option value="${i}">${esc(h)}</option>`});
    row.innerHTML=`<select class="ff">${opts}</select><select class="fo"><option value="eq">=</option><option value="neq">≠</option><option value="gt">&gt;</option><option value="gte">≥</option><option value="lt">&lt;</option><option value="lte">≤</option><option value="contains">包含</option></select><input class="fv" placeholder="值"><button class="fr-del" onclick="this.parentElement.remove()">×</button>`;
    area.appendChild(row);
}
function getFilters(){
    const filters=[];
    document.querySelectorAll('.filter-row').forEach(r=>{
        const idx=parseInt(r.querySelector('.ff').value);if(isNaN(idx))return;
        const field=headers[idx],op=r.querySelector('.fo').value,val=r.querySelector('.fv').value;
        if(field&&val)filters.push({field,op,val});
    });
    return filters;
}
function applyFilters(data){
    const filters=getFilters();if(!filters.length)return data;
    return data.filter(row=>filters.every(f=>{
        const rv=row[f.field],fv=f.val;
        switch(f.op){case'eq':return String(rv)===fv;case'neq':return String(rv)!==fv;case'gt':return Number(rv)>Number(fv);case'gte':return Number(rv)>=Number(fv);case'lt':return Number(rv)<Number(fv);case'lte':return Number(rv)<=Number(fv);case'contains':return String(rv).includes(fv);default:return true}
    }));
}

// ===== Aggregation =====
function aggregate(data,xField,yField,groupField,agg){
    const filtered=applyFilters(data);const groups={};
    filtered.forEach(row=>{
        const key=xField?String(row[xField]??'空值'):'';const group=groupField?String(row[groupField]??'空值'):null;const val=Number(row[yField])||0;
        if(!groups[key])groups[key]={};
        if(!groups[key][group??'_'])groups[key][group??'_']={sum:0,count:0,min:Infinity,max:-Infinity};
        groups[key][group??'_'].sum+=val;groups[key][group??'_'].count++;
        groups[key][group??'_'].min=Math.min(groups[key][group??'_'].min,val);groups[key][group??'_'].max=Math.max(groups[key][group??'_'].max,val);
    });
    const labels=Object.keys(groups);
    const allGroups=[...new Set(Object.values(groups).flatMap(g=>Object.keys(g)))].filter(k=>k!=='_');
    let datasets=[];
    if(groupField&&allGroups.length>0){
        allGroups.forEach((g,i)=>{
            const vals=labels.map(l=>{const gd=groups[l][g];if(!gd)return 0;return agg==='sum'?gd.sum:agg==='avg'?gd.sum/gd.count:agg==='count'?gd.count:agg==='min'?gd.min:agg==='max'?gd.max:gd.sum});
            datasets.push({label:g,data:vals,backgroundColor:COLORS[i%COLORS.length],borderColor:COLORS[i%COLORS.length]});
        });
    }else{
        const vals=labels.map(l=>{const gd=groups[l]['_']||{sum:0,count:0,min:0,max:0};return agg==='sum'?gd.sum:agg==='avg'?gd.sum/gd.count:agg==='count'?gd.count:agg==='min'?gd.min:agg==='max'?gd.max:gd.sum});
        datasets.push({label:yField,data:vals,backgroundColor:COLORS.slice(0,labels.length),borderColor:COLORS.slice(0,labels.length),borderWidth:2});
    }
    return{labels,datasets};
}

function addChart(){
    if(!rawData.length){toast('⚠️ 请先上传数据');return}
    if(!cfg.yAxis){toast('⚠️ 请选择 Y 轴字段');return}
    const agg=document.getElementById('aggSel').value;cfg.agg=agg;
    const title=document.getElementById('chartTitle').value||`${agg.toUpperCase()}(${cfg.yAxis}) by ${cfg.xAxis||'全部'}${cfg.groupBy?' · '+cfg.groupBy:''}`;
    const result=aggregate(rawData,cfg.xAxis,cfg.yAxis,cfg.groupBy,agg);
    const id='w'+(++wId),grid=document.getElementById('dashGrid');
    document.getElementById('emptyState').style.display='none';grid.style.display='grid';
    const isPie=chartType==='pie'||chartType==='doughnut'||chartType==='polarArea';
    result.datasets.forEach((ds,i)=>{
        if(chartType==='table')return;
        ds.backgroundColor=isPie?COLORS.slice(0,result.labels.length):COLORS[i%COLORS.length];
        ds.borderColor=isPie?'transparent':COLORS[i%COLORS.length];ds.borderWidth=isPie?0:2;
        if(chartType==='line'){ds.fill=false;ds.tension=.3;ds.pointRadius=4;ds.backgroundColor=isPie?COLORS.slice(0,result.labels.length):COLORS[i%COLORS.length]+'33'}
        if(chartType==='bar'){ds.borderRadius=4;if(result.datasets.length<=1){ds.backgroundColor=COLORS.slice(0,result.labels.length);ds.borderColor=COLORS.slice(0,result.labels.length)}}
    });
    const widget=document.createElement('div');widget.className='widget';widget.id=id;
    if(chartType==='table'){
        widget.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wa"><button class="del" onclick="removeWidget('${id}')">🗑️</button></div></div><div class="wb"><div style="overflow:auto;max-height:100%"><table><thead><tr><th>${esc(cfg.xAxis||'-')}</th><th>${esc(cfg.yAxis)} (${agg})</th>${cfg.groupBy?`<th>${esc(cfg.groupBy)}</th>`:''}</tr></thead><tbody>${result.labels.map((l,i)=>result.datasets.map(ds=>`<tr><td>${esc(l)}</td><td class="num">${ds.data[i].toLocaleString()}</td>${cfg.groupBy?`<td>${esc(ds.label)}</td>`:''}</tr>`).join('')).join('')}</tbody></table></div></div>`;
    }else{
        widget.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wa"><button class="del" onclick="removeWidget('${id}')">🗑️</button></div></div><div class="wb"><canvas id="cv-${id}"></canvas></div>`;
    }
    grid.appendChild(widget);
    if(chartType!=='table'){
        new Chart(document.getElementById('cv-'+id).getContext('2d'),{type:chartType,data:{labels:result.labels,datasets:result.datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:result.datasets.length>1,position:'bottom',labels:{padding:8,usePointStyle:true,pointStyle:'circle',font:{size:9},color:'#8a8d9e'}},tooltip:{backgroundColor:'#1a1d2e',borderColor:'#2a2d42',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#a29bfe',padding:8,cornerRadius:6}},scales:(isPie||chartType==='radar')?{}:{x:{grid:{display:false},ticks:{color:'#8a8d9e',maxRotation:45,font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}}}}});
    }
    widgets.push({id,title,chartType,xAxis:cfg.xAxis,yAxis:cfg.yAxis,groupBy:cfg.groupBy,agg,config:{...cfg}});
    toast('✅ 图表已添加');
}

function fn(h){return headers.includes(h)?h:null}

function fmtVal(v,field){
    if(v===null||v===undefined||isNaN(v))return'-';
    // If it looks like a percentage field
    if(field&&field.includes('率'))return(v*100).toFixed(2)+'%';
    if(field&&field.includes('比'))return(v*100).toFixed(2)+'%';
    if(field&&field.includes('回报'))return(v*100).toFixed(2)+'%';
    if(field&&field.includes('系数'))return v.toFixed(2);
    if(v>=1e6)return(v/1e6).toFixed(1)+'M';
    if(v>=1e4)return(v/1e4).toFixed(1)+'万';
    if(v>=1e3)return v.toLocaleString();
    if(Number.isInteger(v))return v.toString();
    return v.toFixed(2);
}

function fmtPct(v){return(v*100).toFixed(2)+'%'}
function fmtNum(v){
    if(v===null||v===undefined||isNaN(v))return'-';
    if(v>=1e6)return(v/1e6).toFixed(2)+'M';
    if(v>=1e4)return(v/1e4).toFixed(1)+'万';
    if(v>=1e3)return v.toLocaleString();
    if(Number.isInteger(v))return v.toString();
    return v.toFixed(2);
}

function countryColor(country){
    let hash=0;
    for(let i=0;i<country.length;i++)hash=country.charCodeAt(i)+((hash<<5)-hash);
    return COLORS[Math.abs(hash)%COLORS.length];
}

function roiBadge(v){
    if(v>=0.5)return`<span class="badge good">${fmtPct(v)}</span>`;
    if(v>=0.15)return`<span class="badge warn">${fmtPct(v)}</span>`;
    return`<span class="badge bad">${fmtPct(v)}</span>`;
}
function retentionBadge(v){
    if(v>=0.4)return`<span class="badge good">${fmtPct(v)}</span>`;
    if(v>=0.2)return`<span class="badge warn">${fmtPct(v)}</span>`;
    return`<span class="badge bad">${fmtPct(v)}</span>`;
}

function renderDefaultDash(){
    const view=document.getElementById('defaultView');

        return;
    }

    // === Detect columns by name matching ===
    const dateCol=fn('日期')||headers.find(h=>fieldTypes[h]==='date');
    const countryCol=fn('国家');
    const installsCol=fn('安装');
    const organicCol=fn('自然量安装');
    const organicPctCol=fn('自然量占比');
    const paidCol=fn('买量安装');
    const imprCol=fn('展示');
    const clicksCol=fn('点击');
    const ctrCol=fn('CTR');
    const cvrCol=fn('CVR');
    const cpcCol=fn('CC');
    const spendCol=fn('广告花费');
    const ipmCol=fn('IPM');
    const cpiCol=fn('CPI');
    const cpmCol=fn('CPM');
    const roi0Col=fn('0日回报率');
    const roi1Col=fn('1日回报率');
    const roi3Col=fn('3日回报率');
    const online0Col=fn('0日人均在线时长');
    const online1Col=fn('1日人均在线时长');
    const ret1Col=fn('1日留存率');
    const ret3Col=fn('3日留存率');
    const ltv0Col=fn('0日LTV');
    const ltv1Col=fn('1日LTV');
    const ltv3Col=fn('3日LTV');
    const arppu0Col=fn('0日Arppu');
    const arppu1Col=fn('1日Arppu');
    const arppu3Col=fn('3日Arppu');
    const payCost0Col=fn('0日付费用户成本');
    const payCost1Col=fn('1日付费用户成本');
    const payCost3Col=fn('3日付费用户成本');
    const payRate0Col=fn('0日付费率');
    const payRate1Col=fn('1日付费率');
    const payRate3Col=fn('3日付费率');
    const payUser0Col=fn('0日内付费人数');
    const payUser1Col=fn('1日内付费人数');
    const grow10Col=fn('D1:D0增长系数');
    const grow31Col=fn('D3:D1增长系数');
    const grow30Col=fn('D3:D0 增长系数');

    // Filter out total rows (国家 == '--')
    const dataRows=rawData.filter(r=>countryCol?r[countryCol]!=='--':true);
    const totalRows=rawData.filter(r=>countryCol?r[countryCol]==='--':false);

    // Aggregate totals across all data
    const sum=(col)=>dataRows.reduce((s,r)=>s+(Number(r[col])||0),0);
    const avg=(col)=>{const vals=dataRows.map(r=>Number(r[col])).filter(v=>!isNaN(v));return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0};

    // Unique dates and countries
    const dates=dateCol?[...new Set(dataRows.map(r=>{const d=r[dateCol];return d instanceof Date?d.toISOString().slice(0,10):String(d).slice(0,10)}))].sort():[];
    const countries=countryCol?[...new Set(dataRows.map(r=>r[countryCol]))].filter(c=>c!=='--'&&c):[];

    // Date-grouped aggregation
    const byDate={};
    if(dateCol){
        dataRows.forEach(r=>{
            const d=r[dateCol];const key=d instanceof Date?d.toISOString().slice(0,10):String(d).slice(0,10);
            if(!byDate[key])byDate[key]={};
            headers.forEach(h=>{
                if(fieldTypes[h]==='mea'){
                    if(!byDate[key][h])byDate[key][h]={sum:0,count:0};
                    byDate[key][h].sum+=Number(r[h])||0;
                    byDate[key][h].count++;
                }
            });
        });
    }
    const sortedDates=Object.keys(byDate).sort();

    // Country-grouped aggregation
    const byCountry={};
    if(countryCol){
        dataRows.forEach(r=>{
            const c=r[countryCol];if(!c||c==='--')return;
            if(!byCountry[c])byCountry[c]={};
            headers.forEach(h=>{
                if(fieldTypes[h]==='mea'){
                    if(!byCountry[c][h])byCountry[c][h]={sum:0,count:0};
                    byCountry[c][h].sum+=Number(r[h])||0;
                    byCountry[c][h].count++;
                }
            });
        });
    }

    // ====== BUILD HTML ======
    let html='';

    // --- KPI Row ---
    html+='<div class="kpi-row">';
    const kpiDefs=[
        {icon:'📥',label:'总安装',value:fmtNum(sum(installsCol)),cls:'blue',sub:`自然 ${fmtNum(sum(organicCol))} (${organicPctCol?fmtPct(avg(organicPctCol)):'-'})`},
        {icon:'💰',label:'总广告花费',value:fmtNum(sum(spendCol)),cls:'orange',sub:`CPI $${cpiCol?fmtVal(avg(cpiCol)): '-'}`},
        {icon:'👁️',label:'总展示',value:fmtNum(sum(imprCol)),cls:'cyan',sub:`CPM $${cpmCol?fmtVal(avg(cpmCol)):'-'}`},
        {icon:'👆',label:'总点击',value:fmtNum(sum(clicksCol)),cls:'purple',sub:`CTR ${ctrCol?fmtPct(avg(ctrCol)):'-'} · CVR ${cvrCol?fmtPct(avg(cvrCol)):'-'}`},
        {icon:'📈',label:'1日留存',value:ret1Col?retentionBadge(avg(ret1Col)):'-',cls:'green',sub:`3日 ${ret3Col?retentionBadge(avg(ret3Col)):'-'}`},
        {icon:'🔄',label:'1日ROI',value:roi1Col?roiBadge(avg(roi1Col)):'-',cls:'green',sub:`3日 ${roi3Col?roiBadge(avg(roi3Col)):'-'}`},
        {icon:'💎',label:'3日LTV',value:ltv3Col?'$'+fmtVal(avg(ltv3Col)):'-',cls:'blue',sub:`1日LTV ${ltv1Col?'$'+fmtVal(avg(ltv1Col)):'-'}`},
        {icon:'🎯',label:'3日ARPPU',value:arppu3Col?'$'+fmtVal(avg(arppu3Col)):'-',cls:'orange',sub:`付费率 ${payRate3Col?fmtPct(avg(payRate3Col)):'-'}`},
    ];
    kpiDefs.forEach(k=>{
        html+=`<div class="kpi-card ${k.cls}"><div class="kpi-icon">${k.icon}</div><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div><div class="kpi-sub">${k.sub}</div></div>`;
    });
    html+='</div>';

    // --- 投放趋势 (Time Series) ---
    html+='<div class="sec-title"><span class="st-icon">📈</span>投放趋势（按日期）</div><div class="chart-grid">';
    if(sortedDates.length>0){
        // Installs trend
        const cid1='dt-'+Date.now()+'-1';
        html+=`<div class="chart-card"><h4>📥 安装量 & 买量安装</h4><canvas id="${cid1}"></canvas></div>`;
        // Spend & CPI trend
        const cid2='dt-'+Date.now()+'-2';
        html+=`<div class="chart-card"><h4>💰 广告花费 & CPI</h4><canvas id="${cid2}"></canvas></div>`;
        // ROI trend
        const cid3='dt-'+Date.now()+'-3';
        html+=`<div class="chart-card"><h4>🔄 回报率趋势</h4><canvas id="${cid3}"></canvas></div>`;
        // Retention trend
        const cid4='dt-'+Date.now()+'-4';
        html+=`<div class="chart-card"><h4>📊 留存率趋势</h4><canvas id="${cid4}"></canvas></div>`;
    }
    html+='</div>';

    // --- 市场对比 (Country Comparison) ---
    html+='<div class="sec-title"><span class="st-icon">🌍</span>市场对比</div><div class="chart-grid">';
    if(countries.length>0){
        // Installs by country
        const cid5='ct-'+Date.now()+'-5';
        html+=`<div class="chart-card"><h4>📥 各市场安装量</h4><canvas id="${cid5}"></canvas></div>`;
        // CPI by country
        const cid6='ct-'+Date.now()+'-6';
        html+=`<div class="chart-card"><h4>💰 各市场 CPI</h4><canvas id="${cid6}"></canvas></div>`;
        // ROI by country
        const cid7='ct-'+Date.now()+'-7';
        html+=`<div class="chart-card"><h4>🔄 各市场 ROI</h4><canvas id="${cid7}"></canvas></div>`;
        // Retention by country
        const cid8='ct-'+Date.now()+'-8';
        html+=`<div class="chart-card"><h4>📊 各市场留存率</h4><canvas id="${cid8}"></canvas></div>`;
    }
    html+='</div>';

    // --- 转化漏斗 ---
    html+='<div class="sec-title"><span class="st-icon">🔻</span>投放转化漏斗</div><div class="chart-grid">';
    const cid9='ct-'+Date.now()+'-9';
    html+=`<div class="chart-card"><h4>展示 → 点击 → 安装 → 付费</h4><canvas id="${cid9}"></canvas></div>`;
    html+='</div>';

    // --- 数据明细表 ---
    html+='<div class="sec-title"><span class="st-icon">📋</span>数据明细（按市场）</div>';
    html+='<div class="data-table-wrap"><table class="data-table"><thead><tr>';

    const tableCols=[
        {key:countryCol,label:'市场',type:'str'},
        {key:installsCol,label:'安装',type:'num'},
        {key:organicCol,label:'自然安装',type:'num'},
        {key:paidCol,label:'买量安装',type:'num'},
        {key:spendCol,label:'广告花费($)',type:'num'},
        {key:cpiCol,label:'CPI($)',type:'num'},
        {key:ctrCol,label:'CTR',type:'pct'},
        {key:cvrCol,label:'CVR',type:'pct'},
        {key:imprCol,label:'展示',type:'num'},
        {key:clicksCol,label:'点击',type:'num'},
        {key:roi0Col,label:'D0 ROI',type:'pct'},
        {key:roi1Col,label:'D1 ROI',type:'pct'},
        {key:roi3Col,label:'D3 ROI',type:'pct'},
        {key:ret1Col,label:'D1 留存',type:'pct'},
        {key:ret3Col,label:'D3 留存',type:'pct'},
        {key:ltv0Col,label:'D0 LTV',type:'num'},
        {key:ltv1Col,label:'D1 LTV',type:'num'},
        {key:ltv3Col,label:'D3 LTV',type:'num'},
        {key:payRate1Col,label:'D1 付费率',type:'pct'},
        {key:arppu3Col,label:'D3 ARPPU',type:'num'},
    ].filter(c=>c.key);

    tableCols.forEach(c=>{html+=`<th class="${c.type==='num'||c.type==='pct'?'num':''}">${c.label}</th>`});
    html+='</tr></thead><tbody>';

    // Sort countries by total installs desc
    const sortedCountries=[...countries].sort((a,b)=>{
        const ai=byCountry[a]&&byCountry[a][installsCol]?byCountry[a][installsCol].sum:0;
        const bi=byCountry[b]&&byCountry[b][installsCol]?byCountry[b][installsCol].sum:0;
        return bi-ai;
    });

    const maxInstalls=sortedCountries.length?((byCountry[sortedCountries[0]]&&byCountry[sortedCountries[0]][installsCol])?byCountry[sortedCountries[0]][installsCol].sum:1):1;

    sortedCountries.forEach(c=>{
        const cd=byCountry[c]||{};
        html+='<tr>';
        tableCols.forEach(tc=>{
            const gd=cd[tc.key];
            const v=gd?gd.sum:0;
            const avgV=gd?gd.count?gd.sum/gd.count:0:0;
            let display='-';
            if(tc.type==='num'){display=v?fmtNum(v):'-'}
            else if(tc.type==='pct'){display=v!==undefined&&v!==null&&gd?fmtPct(avgV):'-'}

            if(tc.key===countryCol){
                const color=countryColor(c);
                display=`<div class="country-cell"><span class="flag-dot" style="background:${color}"></span>${esc(c)}</div>`;
            }
            html+=`<td class="${tc.type==='num'||tc.type==='pct'?'num':''}">${display}</td>`;
        });
        html+='</tr>';
    });

    html+='</tbody></table></div>';

    view.innerHTML=html;

    // ===== Render Charts =====
    requestAnimationFrame(()=>{
        if(sortedDates.length>0){
            const xLabels=sortedDates.map(d=>d.slice(5));

            // Installs trend
            const e1=document.getElementById('dt-'+Date.now()+'-1');
            if(e1)new Chart(e1.getContext('2d'),{type:'bar',data:{labels:xLabels,datasets:[
                {label:'安装',data:sortedDates.map(d=>byDate[d][installsCol]?byDate[d][installsCol].sum:0),backgroundColor:'#6c5ce7',borderRadius:4},
                {label:'买量安装',data:sortedDates.map(d=>byDate[d][paidCol]?byDate[d][paidCol].sum:0),backgroundColor:'#a29bfe',borderRadius:4},
                {label:'自然安装',data:sortedDates.map(d=>byDate[d][organicCol]?byDate[d][organicCol].sum:0),backgroundColor:'#00cec9',borderRadius:4},
            ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}}}}});

            // Spend & CPI
            const e2=document.getElementById('dt-'+Date.now()+'-2');
            if(e2)new Chart(e2.getContext('2d'),{type:'line',data:{labels:xLabels,datasets:[
                {label:'广告花费($)',data:sortedDates.map(d=>byDate[d][spendCol]?byDate[d][spendCol].sum:0),borderColor:'#fdcb6e',backgroundColor:'rgba(253,203,110,.1)',fill:true,tension:.3,borderWidth:2,yAxisID:'y'},
                {label:'CPI($)',data:sortedDates.map(d=>byDate[d][cpiCol]?byDate[d][cpiCol].sum/byDate[d][cpiCol].count:0),borderColor:'#ff6b6b',backgroundColor:'transparent',tension:.3,borderWidth:2,borderDash:[5,5],pointRadius:4,yAxisID:'y1'},
            ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}},y:{beginAtZero:true,position:'left',grid:{color:'#2a2d42'},ticks:{color:'#fdcb6e',font:{size:9}}},y1:{beginAtZero:true,position:'right',grid:{display:false},ticks:{color:'#ff6b6b',font:{size:9}}}}}});

            // ROI trend
            const e3=document.getElementById('dt-'+Date.now()+'-3');
            if(e3)new Chart(e3.getContext('2d'),{type:'line',data:{labels:xLabels,datasets:[
                {label:'D0 ROI',data:sortedDates.map(d=>byDate[d][roi0Col]?byDate[d][roi0Col].sum/byDate[d][roi0Col].count:0),borderColor:'#a29bfe',tension:.3,borderWidth:2,pointRadius:4},
                {label:'D1 ROI',data:sortedDates.map(d=>byDate[d][roi1Col]?byDate[d][roi1Col].sum/byDate[d][roi1Col].count:0),borderColor:'#00b894',tension:.3,borderWidth:2,pointRadius:4},
                {label:'D3 ROI',data:sortedDates.map(d=>byDate[d][roi3Col]?byDate[d][roi3Col].sum/byDate[d][roi3Col].count:0),borderColor:'#fdcb6e',tension:.3,borderWidth:2,pointRadius:4},
            ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{callback:v=>(v*100).toFixed(0)+'%',color:'#8a8d9e',font:{size:9}}}}}});

            // Retention trend
            const e4=document.getElementById('dt-'+Date.now()+'-4');
            if(e4)new Chart(e4.getContext('2d'),{type:'line',data:{labels:xLabels,datasets:[
                {label:'D1 留存',data:sortedDates.map(d=>byDate[d][ret1Col]?byDate[d][ret1Col].sum/byDate[d][ret1Col].count:0),borderColor:'#00b894',backgroundColor:'rgba(0,184,148,.1)',fill:true,tension:.3,borderWidth:2},
                {label:'D3 留存',data:sortedDates.map(d=>byDate[d][ret3Col]?byDate[d][ret3Col].sum/byDate[d][ret3Col].count:0),borderColor:'#fdcb6e',backgroundColor:'rgba(253,203,110,.1)',fill:true,tension:.3,borderWidth:2},
            ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{callback:v=>(v*100).toFixed(0)+'%',color:'#8a8d9e',font:{size:9}}}}}});
        }

        // Country charts
        if(countries.length>0){
            const sorted=[...countries].sort((a,b)=>{
                const ai=byCountry[a]&&byCountry[a][installsCol]?byCountry[a][installsCol].sum:0;
                const bi=byCountry[b]&&byCountry[b][installsCol]?byCountry[b][installsCol].sum:0;
                return bi-ai;
            });
            const cLabels=sorted.map(c=>c.replace(/^[A-Z]{2}-/,''));
            const cColors=sorted.map(c=>countryColor(c));

            // Installs by country
            const e5=document.getElementById('ct-'+Date.now()+'-5');
            if(e5)new Chart(e5.getContext('2d'),{type:'bar',data:{labels:cLabels,datasets:[{label:'安装量',data:sorted.map(c=>byCountry[c][installsCol]?byCountry[c][installsCol].sum:0),backgroundColor:cColors,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}}}}});

            // CPI by country
            const e6=document.getElementById('ct-'+Date.now()+'-6');
            if(e6)new Chart(e6.getContext('2d'),{type:'bar',data:{labels:cLabels,datasets:[{label:'CPI($)',data:sorted.map(c=>{const d=byCountry[c][cpiCol];return d&&d.count?d.sum/d.count:0}),backgroundColor:'#ff6b6b',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}}}}});

            // ROI by country
            const e7=document.getElementById('ct-'+Date.now()+'-7');
            if(e7)new Chart(e7.getContext('2d'),{type:'bar',data:{labels:cLabels,datasets:[
                {label:'D1 ROI',data:sorted.map(c=>{const d=byCountry[c][roi1Col];return d&&d.count?d.sum/d.count:0}),backgroundColor:'#00b894',borderRadius:4},
                {label:'D3 ROI',data:sorted.map(c=>{const d=byCountry[c][roi3Col];return d&&d.count?d.sum/d.count:0}),backgroundColor:'#fdcb6e',borderRadius:4},
            ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{callback:v=>(v*100).toFixed(0)+'%',color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}}}}});

            // Retention by country
            const e8=document.getElementById('ct-'+Date.now()+'-8');
            if(e8)new Chart(e8.getContext('2d'),{type:'bar',data:{labels:cLabels,datasets:[
                {label:'D1 留存',data:sorted.map(c=>{const d=byCountry[c][ret1Col];return d&&d.count?d.sum/d.count:0}),backgroundColor:'#a29bfe',borderRadius:4},
                {label:'D3 留存',data:sorted.map(c=>{const d=byCountry[c][ret3Col];return d&&d.count?d.sum/d.count:0}),backgroundColor:'#6c5ce7',borderRadius:4},
            ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{callback:v=>(v*100).toFixed(0)+'%',color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}}}}});
        }

        // Funnel chart
        const totalImpr=sum(imprCol),totalClicks=sum(clicksCol),totalInstalls=sum(installsCol),totalPayUsers=sum(payUser1Col);
        const e9=document.getElementById('ct-'+Date.now()+'-9');
        if(e9)new Chart(e9.getContext('2d'),{type:'bar',data:{labels:['展示','点击','安装','付费用户'],datasets:[{label:'数量',data:[totalImpr,totalClicks,totalInstalls,totalPayUsers],backgroundColor:['#6c5ce7','#a29bfe','#00cec9','#00b894'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{type:'logarithmic',beginAtZero:false,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#e8eaf0',font:{size:11}}}}}});
    });
}

// ===== Toast =====
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800)}

// ===== Init =====
document.getElementById('builder').classList.add('collapsed');
document.getElementById('defaultView').innerHTML='<div class="canvas-empty"><div class="ce-icon">📊</div><h2>上传数据后自动生成看板</h2><p>支持 .xlsx / .xls / .csv 格式 · 自动识别买量指标</p></div>';
</script>
</body>
</html>
