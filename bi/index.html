<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI 数据看板 · Republic Zhu</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        :root{--bg:#0a0b10;--surface:#131520;--card:#1a1d2e;--border:#2a2d42;--accent:#6c5ce7;--accent2:#a29bfe;--accent3:#00cec9;--text:#e8eaf0;--text-dim:#8a8d9e;--text-muted:#5a5d6e;--success:#00b894;--warning:#fdcb6e;--danger:#ff6b6b;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.3)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}

        .topbar{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
        .topbar .brand{font-size:15px;font-weight:700;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
        .topbar .divider{width:1px;height:20px;background:var(--border)}
        .topbar .dataset-name{color:var(--text-dim);font-size:12px;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .topbar .spacer{flex:1}
        .topbar .btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
        .topbar .btn:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
        .topbar .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
        .topbar .btn.danger{border-color:var(--danger);color:var(--danger)}
        .topbar .btn.danger:hover{background:rgba(255,107,107,.1)}

        /* Tabs */
        .tabs{height:40px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0}
        .tab-btn{padding:8px 20px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
        .tab-btn:hover{color:var(--text-dim)}
        .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}

        .main{display:flex;height:calc(100vh - 90px)}

        .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
        .sidebar.collapsed{width:0;border:none}
        .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
        .sidebar-scroll{flex:1;overflow-y:auto;padding:10px}
        .sidebar-scroll::-webkit-scrollbar{width:4px}
        .sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:22px 12px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
        .upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(108,92,231,.05)}
        .upload-area .icon{font-size:28px;margin-bottom:4px}
        .upload-area p{color:var(--text-dim);font-size:11px}
        .upload-area .formats{color:var(--text-muted);font-size:9px;margin-top:2px}

        .field-group{margin-bottom:10px}
        .field-group-title{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;padding-left:6px}
        .field-item{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:5px;cursor:pointer;transition:background .15s;font-size:11px}
        .field-item:hover{background:rgba(108,92,231,.1)}
        .field-item .fi{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
        .field-item .fi.dim{background:rgba(0,206,201,.15);color:var(--accent3)}
        .field-item .fi.mea{background:rgba(253,203,110,.15);color:var(--warning)}
        .field-item .fi.dat{background:rgba(162,155,254,.15);color:var(--accent2)}
        .field-item .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        .builder-panel{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
        .builder-panel.collapsed{width:0;border:none}
        .builder-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
        .builder-scroll{flex:1;overflow-y:auto;padding:12px}
        .builder-scroll::-webkit-scrollbar{width:4px}
        .builder-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        .b-section{margin-bottom:14px}
        .b-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}

        .chart-types{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
        .ct-btn{background:var(--card);border:2px solid var(--border);border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s}
        .ct-btn:hover{border-color:var(--accent)}
        .ct-btn.active{border-color:var(--accent);background:rgba(108,92,231,.15)}
        .ct-btn .ci{font-size:16px;display:block;margin-bottom:1px}
        .ct-btn .cl{font-size:8px;color:var(--text-dim)}

        .f-slot{background:var(--card);border:1px dashed var(--border);border-radius:7px;min-height:30px;padding:5px 8px;display:flex;align-items:center;gap:5px;cursor:pointer;transition:border-color .15s;position:relative}
        .f-slot:hover{border-color:var(--accent)}
        .f-slot.has{border-style:solid;border-color:var(--accent)}
        .f-slot .sp{color:var(--text-muted);font-size:10px;flex:1}
        .f-slot .sv{flex:1;font-size:11px;color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .f-slot .sc{color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
        .f-slot .sc:hover{color:var(--danger)}

        .agg-sel{background:var(--card);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:10px;padding:3px 6px;outline:none;margin-top:5px;width:100%}

        .filter-row{display:flex;gap:3px;align-items:center;margin-bottom:3px}
        .filter-row select,.filter-row input{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:10px;padding:3px 5px;outline:none;flex:1}
        .filter-row select{flex:1.5}
        .filter-row input{flex:1.2}
        .filter-row .fr-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px}
        .filter-row .fr-del:hover{color:var(--danger)}

        .data-prev-toggle{padding:7px 10px;border-top:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text-dim);transition:background .15s}
        .data-prev-toggle:hover{background:rgba(108,92,231,.05)}
        .data-preview{border-top:1px solid var(--border);overflow:auto;max-height:0;transition:max-height .3s}
        .data-preview.open{max-height:250px}
        .data-preview table{width:100%;border-collapse:collapse;font-size:9px}
        .data-preview th{position:sticky;top:0;background:var(--surface);padding:3px 5px;text-align:left;border-bottom:1px solid var(--border);color:var(--text-dim);font-weight:500;white-space:nowrap}
        .data-preview td{padding:2px 5px;border-bottom:1px solid rgba(42,45,66,.5);white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}

        /* Canvas */
        .canvas{flex:1;overflow:auto;padding:16px;position:relative;background:var(--bg)}
        .canvas::-webkit-scrollbar{width:6px;height:6px}
        .canvas::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

        .canvas-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center}
        .canvas-empty .ce-icon{font-size:48px;margin-bottom:10px;opacity:.3}
        .canvas-empty h2{font-size:16px;color:var(--text-dim);margin-bottom:5px}
        .canvas-empty p{font-size:12px}

        .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}

        .widget{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:wIn .25s ease}
        @keyframes wIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        .widget:hover{box-shadow:var(--shadow)}
        .widget .wh{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .widget .wt{font-size:12px;font-weight:600}
        .widget .wa{display:flex;gap:3px}
        .widget .wa button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px}
        .widget .wa button:hover{color:var(--text);background:rgba(255,255,255,.05)}
        .widget .wa button.del:hover{color:var(--danger)}
        .widget .wb{padding:10px;height:260px;position:relative}
        .widget .wb canvas{width:100%!important;height:100%!important}
        .widget .wb table{width:100%;border-collapse:collapse;font-size:11px;overflow:auto;display:block;height:100%}
        .widget .wb th{position:sticky;top:0;background:var(--card);padding:5px 8px;text-align:left;border-bottom:2px solid var(--border);color:var(--text-dim);font-size:10px}
        .widget .wb td{padding:4px 8px;border-bottom:1px solid var(--border)}
        .widget .wb tr:hover td{background:rgba(108,92,231,.05)}

        .modal-overlay{position:fixed;inset:0;background:rgba(10,11,16,.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:380px;width:90%;max-height:65vh;overflow-y:auto}
        .modal h3{font-size:13px;margin-bottom:10px}
        .modal .fpl{max-height:220px;overflow-y:auto}
        .modal .fpi{padding:6px 8px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-size:12px}
        .modal .fpi:hover{background:rgba(108,92,231,.1)}

        .toast{position:fixed;bottom:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:11px;color:var(--text);z-index:2000;box-shadow:var(--shadow);animation:tIn .3s ease,tOut .3s ease 2.3s forwards}
        @keyframes tIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes tOut{from{opacity:1}to{opacity:0}}

        /* Default Dashboard Styles */
        .default-dash{width:100%;padding:0}
        .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
        .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
        .kpi-card .kpi-icon{font-size:20px;margin-bottom:6px}
        .kpi-card .kpi-value{font-size:28px;font-weight:700;color:var(--accent2)}
        .kpi-card .kpi-label{font-size:11px;color:var(--text-dim);margin-top:2px}
        .kpi-card .kpi-sub{font-size:10px;color:var(--text-muted);margin-top:4px}
        .kpi-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.05;transform:translate(15px,-15px)}
        .kpi-card.blue::after{background:var(--accent2)}
        .kpi-card.green::after{background:var(--success)}
        .kpi-card.orange::after{background:var(--warning)}
        .kpi-card.red::after{background:var(--danger)}
        .kpi-card.purple::after{background:var(--accent)}

        .chart-section{margin-bottom:20px}
        .section-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .section-title .st-icon{font-size:16px}

        .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
        .chart-card h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-dim)}
        .chart-card canvas{max-height:280px}
        .chart-card.full{grid-column:1/-1}

        .metric-table{width:100%;border-collapse:collapse;font-size:12px}
        .metric-table th{padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);color:var(--text-dim);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
        .metric-table td{padding:6px 12px;border-bottom:1px solid var(--border)}
        .metric-table tr:hover td{background:rgba(108,92,231,.04)}
        .metric-table .num{text-align:right;font-variant-numeric:tabular-nums}

        .no-data-hint{color:var(--text-muted);font-size:12px;padding:20px;text-align:center;border:1px dashed var(--border);border-radius:var(--radius)}

        @media(max-width:900px){.sidebar{width:200px}.builder-panel{width:240px}.dash-grid,.chart-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <span class="brand">🧱 BI 看板</span>
    <div class="divider"></div>
    <span class="dataset-name" id="dsName">未加载数据</span>
    <div class="spacer"></div>
    <button class="btn" onclick="toggleSidebar()">📋 字段</button>
    <button class="btn" onclick="toggleBuilder()">🎨 构建器</button>
    <div class="divider"></div>
    <button class="btn primary" onclick="document.getElementById('fileIn').click()">📤 上传数据</button>
    <input type="file" id="fileIn" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar">
    <div class="tab-btn active" data-tab="default" onclick="switchTab('default')">📊 默认看板</div>
    <div class="tab-btn" data-tab="custom" onclick="switchTab('custom')">🎨 自定义看板</div>
</div>

<div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">📁 数据源</div>
        <div class="sidebar-scroll">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileIn').click()">
                <div class="icon">📤</div>
                <p>点击或拖拽上传</p>
                <div class="formats">.xlsx / .xls / .csv</div>
            </div>
            <div id="sheetTabs" style="display:none;margin-bottom:10px">
                <div class="b-label">工作表</div>
                <div id="sheetTabList" style="display:flex;gap:4px;flex-wrap:wrap"></div>
            </div>
            <div id="fieldsSection" style="display:none">
                <div class="field-group"><div class="field-group-title">维度</div><div id="dimFields"></div></div>
                <div class="field-group"><div class="field-group-title">度量</div><div id="meaFields"></div></div>
                <div class="field-group"><div class="field-group-title">日期</div><div id="dateFields"></div></div>
            </div>
            <div id="previewSection" style="display:none">
                <div class="data-prev-toggle" onclick="togglePreview()"><span>预览 (<span id="rowCount">0</span> 行)</span><span>▼</span></div>
                <div class="data-preview" id="dataPreview"></div>
            </div>
        </div>
    </div>

    <!-- Builder Panel (only shown in custom tab) -->
    <div class="builder-panel" id="builder">
        <div class="builder-header">🎨 图表构建器</div>
        <div class="builder-scroll">
            <div class="b-section">
                <div class="b-label">图表类型</div>
                <div class="chart-types">
                    <div class="ct-btn active" data-t="bar" onclick="selType('bar')"><span class="ci">📊</span><span class="cl">柱状图</span></div>
                    <div class="ct-btn" data-t="line" onclick="selType('line')"><span class="ci">📈</span><span class="cl">折线图</span></div>
                    <div class="ct-btn" data-t="pie" onclick="selType('pie')"><span class="ci">🥧</span><span class="cl">饼图</span></div>
                    <div class="ct-btn" data-t="doughnut" onclick="selType('doughnut')"><span class="ci">🍩</span><span class="cl">环形图</span></div>
                    <div class="ct-btn" data-t="scatter" onclick="selType('scatter')"><span class="ci">⚬</span><span class="cl">散点图</span></div>
                    <div class="ct-btn" data-t="radar" onclick="selType('radar')"><span class="ci">🕸️</span><span class="cl">雷达图</span></div>
                    <div class="ct-btn" data-t="polarArea" onclick="selType('polarArea')"><span class="ci">🎯</span><span class="cl">极地区域</span></div>
                    <div class="ct-btn" data-t="table" onclick="selType('table')"><span class="ci">📋</span><span class="cl">数据表</span></div>
                </div>
            </div>
            <div class="b-section">
                <div class="b-label">X 轴 (维度)</div>
                <div class="f-slot" id="xSlot" onclick="pickField('xAxis')"><span class="sp">选择维度字段</span></div>
            </div>
            <div class="b-section">
                <div class="b-label">Y 轴 (度量)</div>
                <div class="f-slot" id="ySlot" onclick="pickField('yAxis')"><span class="sp">选择度量字段</span></div>
                <select class="agg-sel" id="aggSel">
                    <option value="sum">SUM 求和</option>
                    <option value="avg">AVG 平均</option>
                    <option value="count">COUNT 计数</option>
                    <option value="min">MIN 最小值</option>
                    <option value="max">MAX 最大值</option>
                </select>
            </div>
            <div class="b-section">
                <div class="b-label">分组 (可选)</div>
                <div class="f-slot" id="gSlot" onclick="pickField('groupBy')"><span class="sp">选择分组字段</span></div>
            </div>
            <div class="b-section">
                <div class="b-label">筛选 (可选)</div>
                <div id="filterArea"></div>
                <button class="btn" onclick="addFilter()" style="width:100%;justify-content:center;margin-top:3px;font-size:10px;padding:5px">+ 添加筛选</button>
            </div>
            <div class="b-section">
                <div class="b-label">图表标题</div>
                <input type="text" id="chartTitle" placeholder="自动生成" style="width:100%;padding:6px 8px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;outline:none">
            </div>
            <button class="btn primary" onclick="addChart()" style="width:100%;justify-content:center;padding:9px;font-size:12px;margin-top:6px">➕ 添加到看板</button>
        </div>
    </div>

    <!-- Canvas -->
    <div class="canvas" id="canvas">
        <!-- Default Dashboard -->
        <div id="defaultView" class="default-dash"></div>
        <!-- Custom Dashboard -->
        <div id="customView" style="display:none">
            <div class="canvas-empty" id="emptyState">
                <div class="ce-icon">📊</div>
                <h2>自定义图表构建</h2>
                <p>在左侧选择字段和图表类型 → 添加到看板</p>
            </div>
            <div class="dash-grid" id="dashGrid" style="display:none"></div>
        </div>
    </div>
</div>

<!-- Field Picker Modal -->
<div class="modal-overlay" id="fModal">
    <div class="modal">
        <h3 id="fModalTitle">选择字段</h3>
        <div class="fpl" id="fPickList"></div>
        <div style="text-align:right;margin-top:10px">
            <button class="btn" onclick="closeModal()" style="font-size:11px;padding:5px 10px">取消</button>
        </div>
    </div>
</div>

<script>
// ===== State =====
let rawData=[],headers=[],fieldTypes={},currentSheet=null,workbook=null;
let chartType='bar',cfg={xAxis:null,yAxis:null,groupBy:null,agg:'sum',filters:[]};
let widgets=[],wId=0,pickTarget=null;
let currentTab='default';
let defaultCharts=[];
const COLORS=['#6c5ce7','#a29bfe','#00b894','#fdcb6e','#ff6b6b','#00cec9','#e17055','#74b9ff','#d63031','#0984e3','#e84393','#55efc4','#fab1a0','#81ecec','#ffeaa7','#dfe6e9','#b2bec3','#636e72','#fd79a8','#f39c12'];
Chart.defaults.color='#8a8d9e';
Chart.defaults.borderColor='#2a2d42';
Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,"SF Pro SC","PingFang SC",sans-serif';
Chart.defaults.font.size=10;

// ===== Tabs =====
function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    document.getElementById('defaultView').style.display=tab==='default'?'block':'none';
    document.getElementById('customView').style.display=tab==='custom'?'block':'none';
    const builder=document.getElementById('builder');
    if(tab==='default'){builder.classList.add('collapsed')}
    else{builder.classList.remove('collapsed')}
    if(tab==='default'&&rawData.length)renderDefaultDash();
}

// ===== Upload =====
const ua=document.getElementById('uploadArea');
ua.addEventListener('dragover',e=>{e.preventDefault();ua.classList.add('dragover')});
ua.addEventListener('dragleave',()=>ua.classList.remove('dragover'));
ua.addEventListener('drop',e=>{e.preventDefault();ua.classList.remove('dragover');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])});

function loadFile(file){
    const r=new FileReader();
    r.onload=function(e){
        try{
            workbook=XLSX.read(e.target.result,{type:'array',cellDates:true});
            const sn=workbook.SheetNames;
            if(sn.length>1){
                document.getElementById('sheetTabs').style.display='block';
                const tl=document.getElementById('sheetTabList');tl.innerHTML='';
                sn.forEach(n=>{
                    const b=document.createElement('button');b.className='btn';b.style.cssText='font-size:10px;padding:3px 7px';b.textContent=n;
                    b.onclick=()=>loadSheet(n);tl.appendChild(b);
                });
                loadSheet(sn[0]);
            }else{loadSheet(sn[0])}
            ua.innerHTML=`<div class="icon">✅</div><p>${file.name}</p><div class="formats">${rawData.length} 行 × ${headers.length} 列</div>`;
            toast('✅ 已加载 '+rawData.length+' 行数据');
            if(currentTab==='default')renderDefaultDash();
        }catch(err){toast('❌ 解析失败: '+err.message)}
    };
    r.readAsArrayBuffer(file);
}

function loadSheet(name){
    currentSheet=name;
    const ws=workbook.Sheets[name];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(!aoa||!aoa.length){toast('⚠️ 空表');return}
    const parsed=smartParse(aoa);
    rawData=parsed.data;
    headers=parsed.headers;
    if(!rawData.length){toast('⚠️ 没有有效数据');return}
    fieldTypes={};
    headers.forEach(h=>{fieldTypes[h]=detectType(h,rawData)});
    const hInfo=parsed.numHeaderRows>1?` (${parsed.numHeaderRows}行标题)`:'';
    document.getElementById('dsName').textContent=currentSheet+' · '+rawData.length+' 行 · '+headers.length+' 列'+hInfo;
    renderFields();renderPreview();
    document.getElementById('fieldsSection').style.display='block';
    document.getElementById('previewSection').style.display='block';
}

function smartParse(aoa){
    const rowInfo=[];
    for(let i=0;i<Math.min(aoa.length,15);i++){
        const row=aoa[i];let nn=0,sc=0,nc=0;
        if(row){for(const v of row){if(v!==null&&v!==undefined&&v!==''){nn++;if(typeof v==='number'||v instanceof Date)nc++;else sc++}}}
        rowInfo.push({idx:i,nn,sc,nc});
    }
    let headerEnd=0,bestNe=0;
    for(let i=0;i<rowInfo.length;i++){
        if(rowInfo[i].nn>bestNe){bestNe=rowInfo[i].nn;headerEnd=rowInfo[i].idx}
        if(rowInfo[i].nc>rowInfo[i].sc&&rowInfo[i].nn>=3)break;
    }
    const headerRows=[];
    for(let i=0;i<=headerEnd;i++){const row=aoa[i];if(row&&row.some(v=>v!==null&&v!==undefined&&v!==''))headerRows.push(row)}
    let maxCols=0;
    for(const row of aoa){if(row&&row.length>maxCols)maxCols=row.length}
    if(maxCols===0)return{headers:[],data:[],numHeaderRows:0};
    const mergedHeaders=[];
    for(let c=0;c<maxCols;c++){
        let parts=[];
        for(const row of headerRows){const v=row[c];if(v!==null&&v!==undefined&&v!=='')parts.push(String(v).trim())}
        mergedHeaders.push(parts.length?parts.join(' · '):('列'+(c+1)));
    }
    const seen={};
    const uniqueHeaders=mergedHeaders.map((h,i)=>{if(seen[h]){seen[h]++;return h+' ('+seen[h]+')'}seen[h]=1;return h});
    const dataRows=[];
    for(let i=headerEnd+1;i<aoa.length;i++){
        const row=aoa[i];if(!row)continue;
        let hasData=false;for(const v of row){if(v!==null&&v!==undefined&&v!==''){hasData=true;break}}
        if(!hasData)continue;
        const obj={};for(let c=0;c<uniqueHeaders.length;c++){const v=row[c];obj[uniqueHeaders[c]]=v!==null&&v!==undefined&&v!==''?v:''}
        dataRows.push(obj);
    }
    return{headers:uniqueHeaders,data:dataRows,numHeaderRows:headerRows.length};
}

function detectType(col,data){
    let nc=0,dc=0,t=0;
    data.slice(0,50).forEach(r=>{
        const v=r[col];if(v===''||v==null||v===undefined)return;t++;
        if(v instanceof Date){dc++;return}
        if(typeof v==='number'){nc++;return}
        if(typeof v==='string'){const n=parseFloat(v.replace(/[,%$￥€£\s]/g,''));if(!isNaN(n)&&n.toString().length<=v.length+2)nc++;else if(/^\d{4}[-/.]\d{1,2}[-/.]/.test(v))dc++}
    });
    if(t===0)return'dim';
    if(dc/t>.5)return'date';
    if(nc/t>.5)return'mea';
    return'dim';
}

// ===== Filters =====
let filterCount=0;
function addFilter(){
    const id=filterCount++;
    const area=document.getElementById('filterArea');
    const row=document.createElement('div');row.className='filter-row';row.id='filter-'+id;
    let opts='<option value="">字段</option>';
    headers.forEach((h,i)=>{opts+=`<option value="${i}">${esc(h)}</option>`});
    row.innerHTML=`<select class="ff">${opts}</select><select class="fo"><option value="eq">=</option><option value="neq">≠</option><option value="gt">&gt;</option><option value="gte">≥</option><option value="lt">&lt;</option><option value="lte">≤</option><option value="contains">包含</option></select><input class="fv" placeholder="值"><button class="fr-del" onclick="this.parentElement.remove()">×</button>`;
    area.appendChild(row);
}
function getFilters(){
    const filters=[];
    document.querySelectorAll('.filter-row').forEach(r=>{
        const idx=parseInt(r.querySelector('.ff').value);if(isNaN(idx))return;
        const field=headers[idx],op=r.querySelector('.fo').value,val=r.querySelector('.fv').value;
        if(field&&val)filters.push({field,op,val});
    });
    return filters;
}
function applyFilters(data){
    const filters=getFilters();if(!filters.length)return data;
    return data.filter(row=>filters.every(f=>{
        const rv=row[f.field],fv=f.val;
        switch(f.op){case'eq':return String(rv)===fv;case'neq':return String(rv)!==fv;case'gt':return Number(rv)>Number(fv);case'gte':return Number(rv)>=Number(fv);case'lt':return Number(rv)<Number(fv);case'lte':return Number(rv)<=Number(fv);case'contains':return String(rv).includes(fv);default:return true}
    }));
}

// ===== Aggregation =====
function aggregate(data,xField,yField,groupField,agg){
    const filtered=applyFilters(data);
    const groups={};
    filtered.forEach(row=>{
        const key=xField?String(row[xField]??'空值'):'';
        const group=groupField?String(row[groupField]??'空值'):null;
        const val=Number(row[yField])||0;
        if(!groups[key])groups[key]={};
        if(!groups[key][group??'_'])groups[key][group??'_']={sum:0,count:0,min:Infinity,max:-Infinity};
        groups[key][group??'_'].sum+=val;groups[key][group??'_'].count++;
        groups[key][group??'_'].min=Math.min(groups[key][group??'_'].min,val);
        groups[key][group??'_'].max=Math.max(groups[key][group??'_'].max,val);
    });
    const labels=Object.keys(groups);
    const allGroups=[...new Set(Object.values(groups).flatMap(g=>Object.keys(g)))].filter(k=>k!=='_');
    let datasets=[];
    if(groupField&&allGroups.length>0){
        allGroups.forEach((g,i)=>{
            const vals=labels.map(l=>{const gd=groups[l][g];if(!gd)return 0;return agg==='sum'?gd.sum:agg==='avg'?gd.sum/gd.count:agg==='count'?gd.count:agg==='min'?gd.min:agg==='max'?gd.max:gd.sum});
            datasets.push({label:g,data:vals,backgroundColor:COLORS[i%COLORS.length],borderColor:COLORS[i%COLORS.length]});
        });
    }else{
        const vals=labels.map(l=>{const gd=groups[l]['_']||{sum:0,count:0,min:0,max:0};return agg==='sum'?gd.sum:agg==='avg'?gd.sum/gd.count:agg==='count'?gd.count:agg==='min'?gd.min:agg==='max'?gd.max:gd.sum});
        datasets.push({label:yField,data:vals,backgroundColor:COLORS.slice(0,labels.length),borderColor:COLORS.slice(0,labels.length),borderWidth:2});
    }
    return{labels,datasets};
}

function addChart(){
    if(!rawData.length){toast('⚠️ 请先上传数据');return}
    if(!cfg.yAxis){toast('⚠️ 请选择 Y 轴字段');return}
    const agg=document.getElementById('aggSel').value;cfg.agg=agg;
    const title=document.getElementById('chartTitle').value||`${agg.toUpperCase()}(${cfg.yAxis}) by ${cfg.xAxis||'全部'}${cfg.groupBy?' · '+cfg.groupBy:''}`;
    const result=aggregate(rawData,cfg.xAxis,cfg.yAxis,cfg.groupBy,agg);
    const id='w'+(++wId);
    const grid=document.getElementById('dashGrid');
    document.getElementById('emptyState').style.display='none';grid.style.display='grid';
    const isPie=chartType==='pie'||chartType==='doughnut'||chartType==='polarArea';
    result.datasets.forEach((ds,i)=>{
        if(chartType==='table')return;
        ds.backgroundColor=isPie?COLORS.slice(0,result.labels.length):COLORS[i%COLORS.length];
        ds.borderColor=isPie?'transparent':COLORS[i%COLORS.length];
        ds.borderWidth=isPie?0:2;
        if(chartType==='line'){ds.fill=false;ds.tension=.3;ds.pointRadius=4;ds.backgroundColor=isPie?COLORS.slice(0,result.labels.length):COLORS[i%COLORS.length]+'33'}
        if(chartType==='bar'){ds.borderRadius=4;if(result.datasets.length<=1){ds.backgroundColor=COLORS.slice(0,result.labels.length);ds.borderColor=COLORS.slice(0,result.labels.length)}}
    });
    const widget=document.createElement('div');widget.className='widget';widget.id=id;
    if(chartType==='table'){
        widget.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wa"><button class="del" onclick="removeWidget('${id}')">🗑️</button></div></div><div class="wb"><div style="overflow:auto;max-height:100%"><table><thead><tr><th>${esc(cfg.xAxis||'-')}</th><th>${esc(cfg.yAxis)} (${agg})</th>${cfg.groupBy?`<th>${esc(cfg.groupBy)}</th>`:''}</tr></thead><tbody>${result.labels.map((l,i)=>result.datasets.map(ds=>`<tr><td>${esc(l)}</td><td class="num">${ds.data[i].toLocaleString()}</td>${cfg.groupBy?`<td>${esc(ds.label)}</td>`:''}</tr>`).join('')).join('')}</tbody></table></div></div>`;
    }else{
        widget.innerHTML=`<div class="wh"><span class="wt">${esc(title)}</span><div class="wa"><button class="del" onclick="removeWidget('${id}')">🗑️</button></div></div><div class="wb"><canvas id="cv-${id}"></canvas></div>`;
    }
    grid.appendChild(widget);
    if(chartType!=='table'){
        new Chart(document.getElementById('cv-'+id).getContext('2d'),{
            type:chartType,data:{labels:result.labels,datasets:result.datasets},
            options:{responsive:true,maintainAspectRatio:false,
                plugins:{legend:{display:result.datasets.length>1,position:'bottom',labels:{padding:8,usePointStyle:true,pointStyle:'circle',font:{size:9},color:'#8a8d9e'}},tooltip:{backgroundColor:'#1a1d2e',borderColor:'#2a2d42',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#a29bfe',padding:8,cornerRadius:6}},
                scales:(isPie||chartType==='radar')?{}:{x:{grid:{display:false},ticks:{color:'#8a8d9e',maxRotation:45,font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}}}
            }
        });
    }
    widgets.push({id,title,chartType,xAxis:cfg.xAxis,yAxis:cfg.yAxis,groupBy:cfg.groupBy,agg,config:{...cfg}});
    toast('✅ 图表已添加');
}
function removeWidget(id){
    const el=document.getElementById(id);if(el)el.remove();
    widgets=widgets.filter(w=>w.id!==id);
    if(!widgets.length){document.getElementById('emptyState').style.display='flex';document.getElementById('dashGrid').style.display='none'}
}

// ===== Default Dashboard =====
function findField(keywords,types){
    for(const kw of keywords){
        for(const h of headers){
            if(fieldTypes[h]===types||types==='any'){
                if(h.toLowerCase().includes(kw.toLowerCase()))return h;
            }
        }
    }
    // Fallback: try partial match
    for(const kw of keywords){
        for(const h of headers){
            if(h.toLowerCase().includes(kw.toLowerCase()))return h;
        }
    }
    return null;
}

function formatNum(n){
    if(n===null||n===undefined||isNaN(n))return'-';
    if(n>=1e9)return(n/1e9).toFixed(1)+'B';
    if(n>=1e6)return(n/1e6).toFixed(1)+'M';
    if(n>=1e4)return(n/1e4).toFixed(1)+'万';
    if(n>=1e3)return n.toLocaleString();
    if(Number.isInteger(n))return n.toString();
    return n.toFixed(2);
}

function renderDefaultDash(){
    const view=document.getElementById('defaultView');
    if(!rawData.length){
        view.innerHTML='<div class="canvas-empty"><div class="ce-icon">📊</div><h2>上传数据后自动生成看板</h2><p>支持 .xlsx / .xls / .csv 格式</p></div>';
        return;
    }

    // Auto-detect fields
    const dateField=findField(['日期','date','时间','time','day'],'date')||findField(['日期','date','时间','time','day'],'any');
    const countryField=findField(['国家','country','地区','region','market','市场'],'dim');
    const channelField=findField(['渠道','channel','media','source','媒体','广告渠道'],'dim');
    const gameField=findField(['游戏','game','产品','product','应用','app'],'dim');
    const dauField=findField(['DAU','dau','日活','日活跃'],'mea');
    const mauField=findField(['MAU','mau','月活','月活跃'],'mea');
    const revenueField=findField(['收入','revenue','流水','income','pay','付费金额','充值','金额'],'mea');
    const installField=findField(['安装','install','下载','download','新增','注册','新注册'],'mea');
    const retentionField=findField(['留存','retention','ret_rate'],'mea');
    const ltvField=findField(['LTV','ltv','生命周期'],'mea');
    const arpuField=findField(['ARPU','arpu','arppu','每用户'],'mea');
    const payUserField=findField(['付费用户','paying','付费人数','付费'],'mea');
    const payRateField=findField(['付费率','pay rate','paying_rate','payrate'],'mea');
    const spendField=findField(['花费','spend','cost','消耗','广告花费','广告支出'],'mea');
    const ctrField=findField(['CTR','ctr','点击率'],'mea');
    const cvrField=findField(['CVR','cvr','转化率'],'mea');
    const cpiField=findField(['CPI','cpi','cpa','安装成本'],'mea');

    // Pick first date column for time series
    const dateColumns=headers.filter(h=>fieldTypes[h]==='date');
    const dimColumns=headers.filter(h=>fieldTypes[h]==='dim');
    const meaColumns=headers.filter(h=>fieldTypes[h]==='mea');

    // Compute summary stats
    const totalRecords=rawData.length;
    const totalMeaSum={};
    meaColumns.forEach(m=>{
        totalMeaSum[m]=rawData.reduce((s,r)=>s+(Number(r[m])||0),0);
    });

    // Group by date if available
    let dateGrouped={};
    if(dateColumns.length>0){
        const dc=dateColumns[0];
        rawData.forEach(r=>{
            const d=String(r[dc]??'').substring(0,10);
            if(!dateGrouped[d])dateGrouped[d]={};
            meaColumns.forEach(m=>{
                if(!dateGrouped[d][m])dateGrouped[d][m]={sum:0,count:0};
                dateGrouped[d][m].sum+=Number(r[m])||0;
                dateGrouped[d][m].count++;
            });
        });
    }

    // Build KPIs
    let kpis=[];
    if(revenueField)kpis.push({icon:'💰',label:'总收入',value:formatNum(totalMeaSum[revenueField]),cls:'blue',sub:meaColumns.length+' 个指标'});
    if(installField)kpis.push({icon:'📥',label:'总安装',value:formatNum(totalMeaSum[installField]),cls:'green',sub:''});
    if(payUserField)kpis.push({icon:'👤',label:'总付费用户',value:formatNum(totalMeaSum[payUserField]),cls:'orange',sub:''});
    if(dauField)kpis.push({icon:'📈',label:'DAU',value:formatNum(totalMeaSum[dauField]),cls:'purple',sub:''});
    if(ltvField)kpis.push({icon:'💎',label:'LTV',value:typeof totalMeaSum[ltvField]==='number'?totalMeaSum[ltvField].toFixed(2):'-',cls:'blue',sub:''});
    if(arpuField)kpis.push({icon:'🎯',label:'ARPU',value:typeof totalMeaSum[arpuField]==='number'?totalMeaSum[arpuField].toFixed(2):'-',cls:'green',sub:''});
    if(payRateField)kpis.push({icon:'📊',label:'付费率',value:typeof totalMeaSum[payRateField]==='number'?totalMeaSum[payRateField].toFixed(2)+'%':'-',cls:'orange',sub:''});
    if(spendField)kpis.push({icon:'💸',label:'总花费',value:formatNum(totalMeaSum[spendField]),cls:'red',sub:''});

    // If no specific fields found, show first few metrics
    if(kpis.length===0&&meaColumns.length>0){
        meaColumns.slice(0,6).forEach((m,i)=>{
            const cls=['blue','green','orange','red','purple'][i%5];
            kpis.push({icon:'📊',label:m,value:formatNum(totalMeaSum[m]),cls,sub:''});
        });
    }

    // Build HTML
    let html='';

    // KPI Row
    html+='<div class="kpi-row">';
    kpis.forEach(k=>{
        html+=`<div class="kpi-card ${k.cls}"><div class="kpi-icon">${k.icon}</div><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div>${k.sub?`<div class="kpi-sub">${k.sub}</div>`:''}</div>`;
    });
    html+='</div>';

    // Charts
    html+='<div class="chart-section"><div class="section-title"><span class="st-icon">📈</span>趋势分析</div><div class="chart-grid">';

    // Trend chart for each measure (up to 3)
    if(dateColumns.length>0&&meaColumns.length>0){
        const dc=dateColumns[0];
        const dates=Object.keys(dateGrouped).sort();
        meaColumns.slice(0,3).forEach((m,mi)=>{
            const cid='dt-'+Date.now()+'-'+mi;
            const vals=dates.map(d=>dateGrouped[d][m]?dateGrouped[d][m].sum:0);
            html+=`<div class="chart-card"><h4>${m} 趋势</h4><canvas id="${cid}"></canvas></div>`;
        });
    }

    html+='</div></div>';

    // Group by dimension
    if(dimColumns.length>0&&meaColumns.length>0){
        html+='<div class="chart-section"><div class="section-title"><span class="st-icon">📊</span>维度分布</div><div class="chart-grid">';
        dimColumns.slice(0,2).forEach((d,di)=>{
            const cid='gd-'+Date.now()+'-'+di;
            // Aggregate top values
            const agg={};
            rawData.forEach(r=>{
                const k=String(r[d]??'未知');
                if(!agg[k])agg[k]=0;
                meaColumns.slice(0,1).forEach(m=>{agg[k]+=(Number(r[m])||0)});
            });
            const entries=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,15);
            const labels=entries.map(e=>e[0]);
            const values=entries.map(e=>e[1]);
            html+=`<div class="chart-card"><h4>${d} · ${meaColumns[0]}</h4><canvas id="${cid}"></canvas></div>`;
        });
        html+='</div></div>';
    }

    // Data summary table
    html+='<div class="chart-section"><div class="section-title"><span class="st-icon">📋</span>数据明细</div>';
    html+='<div class="chart-card" style="overflow:auto"><table class="metric-table"><thead><tr>';
    headers.slice(0,12).forEach(h=>{html+=`<th>${esc(h)}</th>`});
    html+='</tr></thead><tbody>';
    rawData.slice(0,50).forEach(r=>{
        html+='<tr>';headers.slice(0,12).forEach(h=>{
            const v=r[h];
            html+=`<td class="${fieldTypes[h]==='mea'?'num':''}">${esc(v===''||v==null?'-':String(v))}</td>`;
        });html+='</tr>';
    });
    html+='</tbody></table></div></div>';

    view.innerHTML=html;

    // Render charts after DOM update
    requestAnimationFrame(()=>{
        // Trend charts
        if(dateColumns.length>0&&meaColumns.length>0){
            const dc=dateColumns[0];
            const dates=Object.keys(dateGrouped).sort();
            meaColumns.slice(0,3).forEach((m,mi)=>{
                const cid='dt-'+Date.now()+'-'+mi;
                const el=document.getElementById(cid);
                if(!el)return;
                const vals=dates.map(d=>dateGrouped[d][m]?dateGrouped[d][m].sum:0);
                new Chart(el.getContext('2d'),{
                    type:mi===0?'line':'bar',
                    data:{labels:dates.map(d=>d.substring(5)),datasets:[{label:m,data:vals,backgroundColor:COLORS[mi]+'33',borderColor:COLORS[mi],borderWidth:2,tension:.3,fill:mi===0,pointRadius:mi===0?4:0,borderRadius:mi>0?4:undefined}]},
                    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a8d9e',font:{size:9}}}},scales:{x:{grid:{display:false},ticks:{color:'#8a8d9e',maxRotation:45,font:{size:9}}},y:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}}}}
                });
            });
        }
        // Dimension charts
        if(dimColumns.length>0&&meaColumns.length>0){
            dimColumns.slice(0,2).forEach((d,di)=>{
                const cid='gd-'+Date.now()+'-'+di;
                const el=document.getElementById(cid);
                if(!el)return;
                const agg={};
                rawData.forEach(r=>{const k=String(r[d]??'未知');if(!agg[k])agg[k]=0;meaColumns.slice(0,1).forEach(m=>{agg[k]+=(Number(r[m])||0)})});
                const entries=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,15);
                const labels=entries.map(e=>e[0]);
                const values=entries.map(e=>e[1]);
                new Chart(el.getContext('2d'),{
                    type:'bar',
                    data:{labels,datasets:[{label:meaColumns[0],data:values,backgroundColor:COLORS.slice(0,labels.length),borderRadius:4}]},
                    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#2a2d42'},ticks:{color:'#8a8d9e',font:{size:9}}},y:{grid:{display:false},ticks:{color:'#8a8d9e',font:{size:9}}}}}
                });
            });
        }
    });
}

// ===== Toast =====
function toast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// ===== Init =====
document.getElementById('builder').classList.add('collapsed');
</script>
</body>
</html>
