<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>买量 ROI 日报看板 - 2026-04-24 ~ 2026-04-28</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --accent: #6c5ce7; --accent2: #a29bfe; --text: #e2e4ed;
            --text-dim: #8a8d9a; --green: #00b894; --orange: #fdcb6e;
            --red: #ff6b6b; --blue: #0984e3; --purple: #e84393;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.7;
        }
        .nav {
            background: #1a1d27; border-bottom: 1px solid #2a2d3a;
            padding: 16px 0; position: sticky; top: 0; z-index: 100;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav .brand {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header .sub { color: var(--text-dim); font-size: 14px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
        .tab-btn {
            padding: 8px 24px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--card); color: var(--text-dim); font-size: 14px;
            cursor: pointer; transition: all 0.2s; font-weight: 500;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--text); }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .kpi-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px; margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .kpi-card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
        .kpi-card .value { font-size: 28px; font-weight: 700; color: var(--accent2); }
        .kpi-card .trend { font-size: 12px; margin-top: 4px; }
        .kpi-card .trend.up { color: var(--green); }
        .kpi-card .trend.down { color: var(--red); }

        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
        }
        .chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text-dim); }
        .chart-wrapper { position: relative; height: 300px; }

        .section-title {
            font-size: 16px; font-weight: 600; margin: 30px 0 16px;
            padding-left: 12px; border-left: 3px solid var(--accent); color: var(--text);
        }

        .table-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            padding: 10px 8px; text-align: left; color: var(--text-dim);
            font-weight: 500; border-bottom: 2px solid var(--border); white-space: nowrap;
        }
        td { padding: 10px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        tr:hover td { background: rgba(108,92,231,0.05); }
        .td-good { color: var(--green); font-weight: 600; }
        .td-bad { color: var(--red); font-weight: 600; }
        .td-zero { color: var(--text-dim); }

        .footer {
            text-align: center; padding: 30px 0;
            border-top: 1px solid var(--border); color: var(--text-dim); font-size: 13px;
        }

        @media (max-width: 768px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-grid { grid-template-columns: 1fr; }
            .chart-wrapper { height: 250px; }
        }
    </style>
</head>

};

Chart.defaults.color = '#8a8d9a';
Chart.defaults.borderColor = '#2a2d3a';
Chart.defaults.font.size = 11;

function fmt(n, d=2) { return n != null ? n.toFixed(d) : '-'; }
function fmt3(n) { return n != null ? n.toFixed(3) : '-'; }
function roiCls(v) { if (v == null) return 'td-zero'; return v >= 100 ? 'td-good' : v >= 0 ? '' : 'td-bad'; }

function buildTab(key, label, flag) {
    const data = DATA[key];
    const L = data.length;
    const latest = data[L-1];
    const prev = data[L-2];
    const p = 'c-' + key;

    // KPI cards
    let h = '<div class="kpi-grid">';
    const kpis = [
        {l:'总安装',v:latest.installs,t:latest.installs-prev.installs,f:'int'},
        {l:'广告花费',v:latest.spend,t:latest.spend-prev.spend,f:'usd'},
        {l:'CPI',v:latest.cpi,t:prev.cpi!=null?(latest.cpi-prev.cpi):null,f:'usd',inv:1},
        {l:'D0 ROI',v:latest.roi_d0,t:(latest.roi_d0!=null&&prev.roi_d0!=null)?(latest.roi_d0-prev.roi_d0):null,f:'pct'},
        {l:'D1 留存',v:latest.ret_d1,t:latest.ret_d1-prev.ret_d1,f:'pct'},
        {l:'D3 留存',v:latest.ret_d3,t:latest.ret_d3-prev.ret_d3,f:'pct'},
        {l:'D3 LTV',v:latest.ltv_d3,t:latest.ltv_d3-prev.ltv_d3,f:'usd'},
        {l:'CTR',v:latest.ctr,t:(latest.ctr!=null&&prev.ctr!=null)?(latest.ctr-prev.ctr):null,f:'pct'},
        {l:'CVR',v:latest.cvr,t:(latest.cvr!=null&&prev.cvr!=null)?(latest.cvr-prev.cvr):null,f:'pct',inv:1},
    ];
    kpis.forEach(k => {
        let v;
        if (k.f === 'int') v = String(k.v);
        else if (k.f === 'usd') v = k.v != null ? '$' + fmt(k.v) : '-';
        else if (k.f === 'pct') v = k.v != null ? fmt(k.v) + '%' : '-';
        const hasT = k.t != null;
        const cls = hasT && k.t > 0 ? (k.inv ? 'down' : 'up') : (hasT && k.t < 0 ? (k.inv ? 'up' : 'down') : '');
        const arrow = hasT ? (k.t > 0 ? '↑' : k.t < 0 ? '↓' : '—') : '—';
        const tStr = hasT ? `${arrow} ${Math.abs(k.t).toFixed(k.f === 'pct' ? 2 : k.f === 'usd' ? 2 : 0)}${k.f === 'pct' ? '%' : k.f === 'usd' ? '$' : ''}` : '持平';
        h += `<div class="kpi-card"><div class="label">${k.l}</div><div class="value">${v}</div><div class="trend ${cls}">${tStr}</div></div>`;
    });
    h += '</div>';

    // Charts
    h += `<div class="chart-grid">
        <div class="chart-card"><h3>📈 每日安装量</h3><div class="chart-wrapper"><canvas id="${p}-installs"></canvas></div></div>
        <div class="chart-card"><h3>💰 每日广告花费 & CPI</h3><div class="chart-wrapper"><canvas id="${p}-spend"></canvas></div></div>
        <div class="chart-card"><h3>📊 每日 ROI（按新增日期 cohort）</h3><div class="chart-wrapper"><canvas id="${p}-roi"></canvas></div></div>
        <div class="chart-card"><h3>🔄 每日留存率</h3><div class="chart-wrapper"><canvas id="${p}-ret"></canvas></div></div>
        <div class="chart-card"><h3>💎 每日 LTV（按新增日期 cohort）</h3><div class="chart-wrapper"><canvas id="${p}-ltv"></canvas></div></div>
        <div class="chart-card"><h3>🎯 每日 CTR & CVR</h3><div class="chart-wrapper"><canvas id="${p}-ctr"></canvas></div></div>
    </div>`;

    // Table
    h += `<div class="table-section"><div class="section-title">${flag} 每日 Cohort 详细数据</div>
    <div class="table-card"><table><thead><tr>
        <th>新增日期</th><th>安装</th><th>自然量</th><th>买量安装</th>
        <th>广告花费</th><th>CPI</th><th>CTR</th><th>CVR</th>
        <th>D0 ROI</th><th>D1 ROI</th><th>D3 ROI</th>
        <th>D1 留存</th><th>D3 留存</th>
        <th>D0 LTV</th><th>D1 LTV</th><th>D3 LTV</th>
    </tr></thead><tbody>`;
    data.forEach(d => {
        const dt = '2026-' + d.date.replace('-','-');
        h += `<tr>
            <td>${d.date}</td><td>${d.installs}</td><td>${d.organic}</td><td>${d.paid}</td>
            <td>$${fmt(d.spend)}</td><td>${d.cpi!=null?'$'+fmt(d.cpi):'-'}</td>
            <td>${d.ctr!=null?fmt(d.ctr,2)+'%':'-'}</td><td>${d.cvr!=null?fmt(d.cvr,2)+'%':'-'}</td>
            <td class="${roiCls(d.roi_d0)}">${d.roi_d0!=null?fmt(d.roi_d0,2)+'%':'-'}</td>
            <td class="${roiCls(d.roi_d1)}">${d.roi_d1!=null?fmt(d.roi_d1,2)+'%':'-'}</td>
            <td class="${roiCls(d.roi_d3)}">${d.roi_d3!=null?fmt(d.roi_d3,2)+'%':'-'}</td>
            <td>${fmt(d.ret_d1,1)}%</td><td>${fmt(d.ret_d3,1)}%</td>
            <td>$${fmt3(d.ltv_d0)}</td><td>$${fmt3(d.ltv_d1)}</td><td>$${fmt3(d.ltv_d3)}</td>
        </tr>`;
    });
    h += '</tbody></table></div></div>';
    return h;
}

// Render all tabs
document.getElementById('tab-ov').innerHTML = buildTab('ov', '', '🌐');
document.getElementById('tab-id').innerHTML = buildTab('id', '', '🇮🇩');
document.getElementById('tab-us').innerHTML = buildTab('us', '', '🇺🇸');

function switchTab(key) {
    document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
    document.getElementById('tab-' + key).classList.add('active');
    event.target.classList.add('active');
    setTimeout(() => renderCharts(key), 50);
}

const DATES = DATA.dates;

function mkChart(id, type, datasets, dualAxis) {
    const el = document.getElementById(id);
    if (!el || el._chartDone) return;
    const cfg = {
        type,
        data: { labels: DATES, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#a29bfe', padding: 12, font: { size: 11 } } } },
            scales: {
                x: { ticks: { color: '#8a8d9a', maxRotation: 0 }, grid: { color: '#2a2d3a' }, title: { display: true, text: '新增日期', color: '#8a8d9a' } },
                y: { ticks: { color: '#8a8d9a' }, grid: { color: '#2a2d3a' } }
            }
        }
    };
    if (dualAxis) {
        cfg.options.scales.y1 = { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#fdcb6e' }, title: { display: true, text: 'CPI', color: '#fdcb6e' } };
        cfg.options.scales.y.title = { display: true, text: '花费 ($)', color: '#a29bfe' };
    }
    new Chart(el, cfg);
    el._chartDone = true;
}

function renderCharts(key) {
    const data = DATA[key];
    const p = 'c-' + key;

    mkChart(p + '-installs', 'bar', [
        { label: '自然量', data: data.map(d => d.organic), backgroundColor: 'rgba(162,155,254,0.7)', borderRadius: 4 },
        { label: '买量安装', data: data.map(d => d.paid), backgroundColor: 'rgba(108,92,231,0.7)', borderRadius: 4 },
    ]);

    mkChart(p + '-spend', 'line', [
        { label: '广告花费 ($)', data: data.map(d => d.spend), borderColor: '#6c5ce7', backgroundColor: 'rgba(108,92,231,0.1)', fill: true, tension: 0.3, yAxisID: 'y' },
        { label: 'CPI ($)', data: data.map(d => d.cpi), borderColor: '#fdcb6e', tension: 0.3, yAxisID: 'y1', borderDash: [5, 5] },
    ], true);

    // ROI: X = install date, lines = D0/D1/D3
    mkChart(p + '-roi', 'line', [
        { label: 'D0 ROI', data: data.map(d => d.roi_d0), borderColor: '#00b894', backgroundColor: 'rgba(0,184,148,0.1)', tension: 0.3, pointRadius: 5, pointHoverRadius: 7, fill: true },
        { label: 'D1 ROI', data: data.map(d => d.roi_d1), borderColor: '#fdcb6e', tension: 0.3, pointRadius: 5, pointHoverRadius: 7 },
        { label: 'D3 ROI', data: data.map(d => d.roi_d3), borderColor: '#e84393', tension: 0.3, pointRadius: 5, pointHoverRadius: 7 },
    ]);

    // Retention
    mkChart(p + '-ret', 'line', [
        { label: 'D1 留存率', data: data.map(d => d.ret_d1), borderColor: '#0984e3', tension: 0.3, pointRadius: 5 },
        { label: 'D3 留存率', data: data.map(d => d.ret_d3), borderColor: '#00b894', tension: 0.3, pointRadius: 5 },
    ]);

    // LTV: X = install date, lines = D0/D1/D3
    mkChart(p + '-ltv', 'line', [
        { label: 'D0 LTV', data: data.map(d => d.ltv_d0), borderColor: '#6c5ce7', tension: 0.3, pointRadius: 5 },
        { label: 'D1 LTV', data: data.map(d => d.ltv_d1), borderColor: '#a29bfe', tension: 0.3, pointRadius: 5 },
        { label: 'D3 LTV', data: data.map(d => d.ltv_d3), borderColor: '#fdcb6e', tension: 0.3, pointRadius: 5 },
    ]);

    // CTR & CVR
    mkChart(p + '-ctr', 'bar', [
        { label: 'CTR (%)', data: data.map(d => d.ctr), backgroundColor: 'rgba(0,184,148,0.7)', borderRadius: 4 },
        { label: 'CVR (%)', data: data.map(d => d.cvr), backgroundColor: 'rgba(253,203,110,0.7)', borderRadius: 4 },
    ]);
}

// Initial render
setTimeout(() => renderCharts('ov'), 100);
</script>
