        .summary-bar .item{font-size:13px}
        .summary-bar .item .val{font-weight:700;color:var(--accent2);font-size:16px;margin-right:4px}
        .summary-bar .item .lbl{color:var(--text-dim)}

        .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:transform .2s,border-color .2s}
        .kpi-card:hover{transform:translateY(-2px);border-color:var(--accent)}
        .kpi-card .label{font-size:13px;color:var(--text-dim);margin-bottom:6px}
        .kpi-card .value{font-size:26px;font-weight:700;color:var(--accent2)}
        .kpi-card .unit{font-size:13px;color:var(--text-dim);margin-left:2px}

        .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:20px;margin-bottom:30px}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
        .chart-card h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text-dim)}
        .chart-wrapper{position:relative;height:300px}

        .section-title{font-size:16px;font-weight:600;margin:30px 0 16px;padding-left:12px;border-left:3px solid var(--accent);color:var(--text)}

        table{width:100%;border-collapse:collapse;font-size:13px}
        th{padding:10px 8px;text-align:left;color:var(--text-dim);font-weight:500;border-bottom:2px solid var(--border);white-space:nowrap}
        td{padding:10px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
        tr:hover td{background:rgba(108,92,231,.05)}
        .td-good{color:var(--green);font-weight:600}
        .td-bad{color:var(--red);font-weight:600}
        .td-zero{color:var(--text-dim)}

        .footer{text-align:center;padding:30px 0;border-top:1px solid var(--border);color:var(--text-dim);font-size:13px}

        @media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}.chart-wrapper{height:250px}}

function switchTab(key){
    document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
    document.getElementById('tab-'+key).classList.add('active');
    event.target.classList.add('active');
    setTimeout(()=>renderCharts(key),50);
}

function mkChart(id,type,datasets,opts={}){
    const el=document.getElementById(id);
    if(!el||el._chartDone)return;
    const scales={
        x:{ticks:{color:'#8a8d9a',maxRotation:0},grid:{color:'#2a2d3a'}},
        y:{ticks:{color:'#8a8d9a'},grid:{color:'#2a2d3a'}}
    };
    if(opts.dualAxis){
        scales.y1={position:'right',grid:{drawOnChartArea:false},ticks:{color:'#fdcb6e'},title:{display:true,text:opts.y1Label||'CPI',color:'#fdcb6e'}};
        scales.y.title={display:true,text:opts.yLabel||'花费 ($)',color:'#a29bfe'};
    }
    if(opts.yLabel&&!opts.dualAxis)scales.y.title={display:true,text:opts.yLabel,color:'#a29bfe'};
    new Chart(el,{type,data:{labels:opts.labels||DATA.dates,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#a29bfe',padding:12,font:{size:11}}}},scales}});
    el._chartDone=true;
}

const COLORS=['#00b894','#6c5ce7','#fdcb6e','#e84393','#0984e3','#a29bfe','#ff6b6b','#00cec9'];

function renderCharts(key){
    const data=DATA[key];
    const p='c-'+key;
    if(document.getElementById(p+'-roi')?.classList?.contains('rendered'))return;

        borderColor:COLORS[i],tension:0.3,pointRadius:5,pointHoverRadius:7,fill:false,

    // LTV: X=D0,D1,D3; each line=one date

    // Installs stacked bar
    mkChart(p+'-installs','bar',[
        {label:'自然量',data:data.map(d=>d.organic),backgroundColor:'rgba(162,155,254,0.7)',borderRadius:4},
        {label:'买量安装',data:data.map(d=>d.paid),backgroundColor:'rgba(108,92,231,0.7)',borderRadius:4},
    ],{labels:DATES});

    // Spend & CPI dual axis
    mkChart(p+'-spend','line',[
        {label:'广告花费 ($)',data:data.map(d=>d.spend),borderColor:'#6c5ce7',backgroundColor:'rgba(108,92,231,0.1)',fill:true,tension:0.3,yAxisID:'y'},
        {label:'CPI ($)',data:data.map(d=>d.cpi),borderColor:'#fdcb6e',tension:0.3,borderDash:[5,5],yAxisID:'y1'},
    ],{labels:DATES,dualAxis:true});

    // Retention
    mkChart(p+'-ret','line',[
        {label:'D1 留存',data:data.map(d=>d.ret_d1),borderColor:'#0984e3',tension:0.3,pointRadius:5},
        {label:'D3 留存',data:data.map(d=>d.ret_d3),borderColor:'#00b894',tension:0.3,pointRadius:5},
    ],{labels:DATES});

    // CTR separate
    mkChart(p+'-ctr','line',[
        {label:'CTR (%)',data:data.map(d=>d.ctr),borderColor:'#00b894',tension:0.3,pointRadius:5,fill:true,backgroundColor:'rgba(0,184,148,0.1)'},
    ],{labels:DATES,yLabel:'CTR (%)'});

    // CVR separate
    mkChart(p+'-cvr','line',[
        {label:'CVR (%)',data:data.map(d=>d.cvr),borderColor:'#fdcb6e',tension:0.3,pointRadius:5,fill:true,backgroundColor:'rgba(253,203,110,0.1)'},
    ],{labels:DATES,yLabel:'CVR (%)'});
}

setTimeout(()=>renderCharts('ov'),100);
</script>
</body>
</html>
