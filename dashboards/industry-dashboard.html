<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏行业数据看板 - Republic Zhu</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --text: #e2e4ed;
            --text-dim: #8a8d9a;
            --green: #00b894;
            --orange: #fdcb6e;
            --red: #ff6b6b;
            --cyan: #00cec9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }
        .nav {
            background: #1a1d27;
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav .brand {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav .links { display: flex; gap: 20px; }
        .nav .links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav .links a:hover { color: var(--accent2); }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .header .logo { font-size: 36px; margin-bottom: 8px; }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: var(--text-dim); font-size: 14px; }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .kpi-card .icon { font-size: 28px; margin-bottom: 8px; }
        .kpi-card .value { font-size: 32px; font-weight: 700; color: var(--accent2); }
        .kpi-card .label { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

        /* Chart Cards */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-card canvas { max-height: 350px; }

        /* Full width chart */
        .chart-full {
            grid-column: 1 / -1;
        }

        /* Tags / Lists */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
        }
        .tag-item {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            background: rgba(108,92,231,0.12);
            color: var(--accent2);
            border: 1px solid var(--border);
            cursor: default;
            transition: all 0.2s;
        }
        .tag-item:hover {
            background: rgba(108,92,231,0.25);
        }
        .tag-item .count {
            margin-left: 4px;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Ranked list */
        .ranked-list { list-style: none; }
        .ranked-list li {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .ranked-list li:last-child { border-bottom: none; }
        .ranked-list .rank {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .rank.r1 { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
        .rank.r2 { background: linear-gradient(135deg, #fdcb6e, #f39c12); color: #fff; }
        .rank.r3 { background: linear-gradient(135deg, #00b894, #00cec9); color: #fff; }
        .rank.normal { background: var(--border); color: var(--text-dim); }
        .ranked-list .name { flex: 1; font-size: 14px; }
        .ranked-list .bar {
            width: 120px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin: 0 12px;
        }
        .ranked-list .bar-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }
        .ranked-list .count { font-size: 13px; color: var(--text-dim); min-width: 24px; text-align: right; }

        /* Source table */
        .source-table { width: 100%; border-collapse: collapse; }
        .source-table th, .source-table td {
            padding: 10px 12px;
            text-align: left;
            font-size: 14px;
        }
        .source-table th {
            color: var(--text-dim);
            font-weight: 500;
            border-bottom: 2px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .source-table td { border-bottom: 1px solid var(--border); }
        .source-table tr:last-child td { border-bottom: none; }
        .source-table .total-row { font-weight: 600; }

        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--border);
            margin-top: 30px;
            color: var(--text-dim);
            font-size: 13px;
        }
        .footer a { color: var(--accent2); text-decoration: none; }

        @media (max-width: 768px) {
            .container { padding: 20px 12px; }
            .chart-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="../index.html" class="brand">🧱 Republic Zhu</a>
            <div class="links">
                <a href="../index.html">← 返回首页</a>
                <a href="../index.html">日报</a>
                <a href="https://republic-zhu.com" target="_blank">官网</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div class="logo">📊</div>
            <h1>游戏行业数据看板</h1>
            <p>基于公众号日报自动聚合 · 数据持续积累中</p>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-grid" id="kpiGrid"></div>

        <!-- Charts -->
        <div class="chart-grid">
            <div class="chart-card chart-full">
                <h3>📈 每日文章数趋势</h3>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📊 各公众号发文分布</h3>
                <canvas id="sourceChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>🎮 游戏提及排行榜</h3>
                <ul class="ranked-list" id="gameList"></ul>
            </div>
            <div class="chart-card chart-full">
                <h3>🏷️ 热点关键词云</h3>
                <div class="tag-list" id="keywordCloud"></div>
            </div>
        </div>

        <!-- Source Detail Table -->
        <div class="chart-card" style="margin-bottom: 30px;">
            <h3>📋 公众号详细数据</h3>
            <table class="source-table" id="sourceTable">
                <thead>
                    <tr>
                        <th>公众号</th>
                        <th>总文章数</th>
                        <th>占比</th>
                        <th>日均产出</th>
                        <th>覆盖天数</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="footer">
            <p>数据来源：9 个游戏行业公众号 · AI 自动抓取聚合</p>
            <p style="margin-top:8px">Powered by 小柱子 AI · 持续更新中</p>
        </div>
    </div>

<script>
const DATA = {"dates": ["2026-05-07", "unknown"], "sources": ["DataEye游戏观察", "GameRes游资网", "游戏研究社", "游戏茶馆", "游戏葡萄", "游戏那点事Gamez", "游戏陀螺", "白鲸出海", "罗斯基", "罗斯基 / 游戏葡萄"], "dateCounts": [10, 20], "dateSourceCount": {"2026-05-07": {"游戏葡萄": 1, "罗斯基 / 游戏葡萄": 1, "DataEye游戏观察": 1, "游戏研究社": 2, "游戏陀螺": 1, "游戏茶馆": 1, "游戏那点事Gamez": 2, "GameRes游资网": 1}, "unknown": {"游戏葡萄": 5, "白鲸出海": 3, "罗斯基": 2, "游戏研究社": 3, "游戏茶馆": 3, "游戏陀螺": 3, "游戏那点事Gamez": 1}}, "sourceTotals": {"游戏葡萄": 6, "罗斯基 / 游戏葡萄": 1, "DataEye游戏观察": 1, "游戏研究社": 5, "游戏陀螺": 4, "游戏茶馆": 4, "游戏那点事Gamez": 3, "GameRes游资网": 1, "白鲸出海": 3, "罗斯基": 2}, "topGames": [{"name": "异环", "count": 4}, {"name": "掌上谈兵", "count": 2}, {"name": "无尽冬日", "count": 2}, {"name": "灵魂面甲", "count": 2}, {"name": "Last Asylum", "count": 2}, {"name": "Last Asylum: Plague", "count": 2}, {"name": "Township", "count": 2}, {"name": "Merge Mansion", "count": 1}, {"name": "六六英雄", "count": 1}, {"name": "逆转回合", "count": 1}, {"name": "少女前线", "count": 1}, {"name": "三国：百将牌", "count": 1}, {"name": "宗师之上", "count": 1}, {"name": "卡厄思梦境", "count": 1}, {"name": "镭明闪击", "count": 1}], "topKeywords": [{"name": "流水", "count": 7}, {"name": "二次元", "count": 6}, {"name": "畅销榜", "count": 5}, {"name": "AI", "count": 4}, {"name": "腾讯", "count": 4}, {"name": "SLG", "count": 4}, {"name": "策略", "count": 4}, {"name": "长线运营", "count": 4}, {"name": "开放世界", "count": 4}, {"name": "收入", "count": 4}, {"name": "出海", "count": 4}, {"name": "任天堂", "count": 4}, {"name": "IP", "count": 3}, {"name": "主机", "count": 3}, {"name": "小游戏", "count": 2}, {"name": "完美世界", "count": 2}, {"name": "跨端", "count": 2}, {"name": "PC", "count": 2}, {"name": "三七", "count": 2}, {"name": "手游", "count": 2}], "dateKeywords": {"2026-05-07": {"AI": 3, "融资": 1, "Supercell": 1, "收购": 1, "小游戏": 1, "二次元": 1, "腾讯": 2, "SLG": 2, "流水": 2, "策略": 1, "IP": 1, "长线运营": 1}, "unknown": {"二次元": 5, "完美世界": 2, "畅销榜": 5, "流水": 5, "跨端": 2, "PC": 2, "主机": 3, "开放世界": 4, "SLG": 2, "三七": 2, "腾讯": 2, "长线运营": 3, "收入": 4, "手游": 2, "RPG": 2, "ARPG": 1, "留存": 2, "模拟经营": 2, "策略": 3, "AI": 1, "出海": 4, "日本": 1, "ROI": 1, "IP": 2, "任天堂": 4, "抽卡": 1, "合规": 1, "欧洲": 1, "战斗通行证": 1, "监管": 1, "16+": 1, "PEGI": 1, "Playrix": 1, "变现": 1, "小游戏": 1, "微信": 1, "Unity": 1, "财报": 1, "独立游戏": 1, "东南亚": 1}}, "totalArticles": 30, "totalSources": 10};

// Chart.js defaults
Chart.defaults.color = '#8a8d9a';
Chart.defaults.borderColor = '#2a2d3a';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", sans-serif';

const colors = ['#6c5ce7', '#a29bfe', '#00b894', '#fdcb6e', '#ff6b6b', '#00cec9', '#e17055', '#74b9ff', '#d63031', '#0984e3', '#e84393', '#55efc4'];

// KPI Cards
const kpis = [
    { icon: '📰', value: DATA.totalArticles, label: '累计文章数' },
    { icon: '📅', value: DATA.dates.length, label: '覆盖天数' },
    { icon: '📡', value: DATA.totalSources, label: '覆盖公众号' },
    { icon: '🎮', value: DATA.topGames.length, label: '提及游戏数' },
];
const kpiGrid = document.getElementById('kpiGrid');
kpis.forEach(k => {
    kpiGrid.innerHTML += `
        <div class="kpi-card">
            <div class="icon">${k.icon}</div>
            <div class="value">${k.value}</div>
            <div class="label">${k.label}</div>
        </div>
    `;
});

// Trend Chart
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
        labels: DATA.dates.map(d => d.substring(5)),
        datasets: [{
            label: '每日文章数',
            data: DATA.dateCounts,
            borderColor: '#6c5ce7',
            backgroundColor: 'rgba(108,92,231,0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 6,
            pointHoverRadius: 8,
            pointBackgroundColor: '#6c5ce7',
            borderWidth: 3,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { display: false },
            tooltip: {
                backgroundColor: '#1a1d27',
                borderColor: '#2a2d3a',
                borderWidth: 1,
                titleColor: '#e2e4ed',
                bodyColor: '#a29bfe',
                padding: 12,
                cornerRadius: 8,
            }
        },
        scales: {
            x: { grid: { display: false } },
            y: {
                beginAtZero: true,
                grid: { color: '#2a2d3a' },
                ticks: { stepSize: 2 }
            }
        }
    }
});

// Source Distribution Chart
const sourceEntries = Object.entries(DATA.sourceTotals).sort((a, b) => b[1] - a[1]);
new Chart(document.getElementById('sourceChart'), {
    type: 'doughnut',
    data: {
        labels: sourceEntries.map(s => s[0]),
        datasets: [{
            data: sourceEntries.map(s => s[1]),
            backgroundColor: colors,
            borderWidth: 0,
            hoverOffset: 8,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '55%',
        plugins: {
            legend: {
                position: 'bottom',
                labels: { padding: 12, usePointStyle: true, pointStyle: 'circle', font: { size: 11 } }
            }
        }
    }
});

// Game Rankings
const gameList = document.getElementById('gameList');
const maxGameCount = DATA.topGames.length > 0 ? DATA.topGames[0].count : 1;
DATA.topGames.forEach((g, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `r${rank}` : 'normal';
    const pct = (g.count / maxGameCount * 100).toFixed(0);
    gameList.innerHTML += `
        <li>
            <span class="rank ${rankClass}">${rank}</span>
            <span class="name">《${g.name}》</span>
            <span class="bar"><span class="bar-fill" style="width: ${pct}%"></span></span>
            <span class="count">${g.count}</span>
        </li>
    `;
});

// Keyword Cloud
const cloud = document.getElementById('keywordCloud');
const maxKwCount = DATA.topKeywords.length > 0 ? DATA.topKeywords[0].count : 1;
DATA.topKeywords.forEach(kw => {
    const size = 12 + (kw.count / maxKwCount * 16);
    const opacity = 0.3 + (kw.count / maxKwCount * 0.7);
    cloud.innerHTML += `
        <span class="tag-item" style="font-size: ${size}px; opacity: ${opacity};">
            ${kw.name}<span class="count">${kw.count}</span>
        </span>
    `;
});

// Source Detail Table
const tbody = document.querySelector('#sourceTable tbody');
const totalArticles = DATA.totalArticles;
const numDays = DATA.dates.length;
sourceEntries.forEach((s, i) => {
    const pct = (s[1] / totalArticles * 100).toFixed(1);
    const avg = (s[1] / numDays).toFixed(1);
    // Count days this source was active
    let activeDays = 0;
    DATA.dates.forEach(d => {
        if (DATA.dateSourceCount[d] && DATA.dateSourceCount[d][s[0]] > 0) activeDays++;
    });
    tbody.innerHTML += `
        <tr>
            <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colors[i % colors.length]};margin-right:8px;"></span>${s[0]}</td>
            <td>${s[1]}</td>
            <td>${pct}%</td>
            <td>${avg}</td>
            <td>${activeDays}/${numDays}</td>
        </tr>
    `;
});
// Total row
tbody.innerHTML += `
    <tr class="total-row">
        <td>合计</td>
        <td>${totalArticles}</td>
        <td>100%</td>
        <td>${(totalArticles / numDays).toFixed(1)}</td>
        <td>${numDays}/${numDays}</td>
    </tr>
`;
</script>
</body>
</html>
